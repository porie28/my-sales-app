                                        <a href="https://wa.me/62${(u.phone || '').startsWith('0') ? (u.phone || '').substring(1) : (u.phone || '')}" target="_blank" class="w-8 h-8 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center border hover:bg-indigo-100 transition-all"><i class="fab fa-whatsapp text-xs"></i></a>
                                        ${user.role === 'admin' && html`
                                            <button onClick=${() => setEditingUser(u)} class="w-8 h-8 bg-indigo-50 text-indigo-600 rounded-full border flex items-center justify-center hover:bg-indigo-100" title="Edit Data Karyawan"><i class="fas fa-pen text-xs"></i></button>
                                            <button onClick=${() => {
                                                if (u.id === user.id) {
                                                    notify("Anda tidak dapat menghapus akun Anda sendiri!", "error");
                                                } else {
                                                    setUserToDelete(u.id);
                                                }
                                            }} class="w-8 h-8 bg-rose-50 text-rose-600 rounded-full border flex items-center justify-center hover:bg-rose-100" title="Hapus Anggota"><i class="fas fa-trash-can text-xs"></i></button>
                                        `}
                                    </div>
                                </div>
                            `)}
                        </div>
                    </div>

                    <!-- CUSTOM CONFIRMATION DELETION MODAL OVERLAY -->
                    ${userToDelete && html`
                        <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div class="bg-white p-6 rounded-[2rem] max-w-sm w-full shadow-2xl border text-center space-y-4">
                                <div class="w-12 h-12 bg-rose-100 text-rose-600 rounded-2xl flex items-center justify-center text-xl mx-auto"><i class="fas fa-trash"></i></div>
                                <h3 class="font-black text-slate-800 text-lg">Hapus Anggota Tim?</h3>
                                <p class="text-xs text-slate-500 leading-relaxed">Tindakan ini akan menghapus data anggota secara permanen dari basis data HRIS.</p>
                                <div class="grid grid-cols-2 gap-2 pt-2">
                                    <button onClick=${() => setUserToDelete(null)} class="p-3 bg-slate-100 text-slate-700 rounded-xl text-xs font-bold uppercase tracking-wider">Batal</button>
                                    <button onClick=${triggerDeleteUser} class="p-3 bg-rose-600 text-white rounded-xl text-xs font-bold uppercase tracking-wider">Hapus Permanen</button>
                                </div>
                            </div>
                        </div>
                    `}

                    <!-- MODAL EDIT DATA PROFIL KUSTOM -->
                    ${editingUser && html`
                        <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <form onSubmit=${handleSaveEdit} class="bg-white p-6 rounded-[2.5rem] max-w-sm w-full shadow-2xl border space-y-4">
                                <h3 class="font-black text-slate-800 text-lg">Ubah Data Profil</h3>
                                <div class="space-y-3">
                                    <input placeholder="Nama Lengkap" value=${editingUser.name} onInput=${e => setEditingUser({...editingUser, name: e.target.value})} class="w-full p-3 rounded-2xl bg-slate-50 border outline-none text-sm font-semibold" required />
                                    <input placeholder="Email" type="email" value=${editingUser.email} onInput=${e => setEditingUser({...editingUser, email: e.target.value})} class="w-full p-3 rounded-2xl bg-slate-50 border outline-none text-sm font-semibold" required />
                                    <input placeholder="Nomor WhatsApp" value=${editingUser.phone} onInput=${e => setEditingUser({...editingUser, phone: e.target.value})} class="w-full p-3 rounded-2xl bg-slate-50 border outline-none text-sm font-semibold" required />
                                    
                                    ${user.role === 'admin' && html`

                                    <button type="button" onClick=${() => setEditingUser(null)} class="p-3 bg-slate-100 text-slate-700 rounded-xl text-xs font-bold uppercase tracking-wider">Batal</button>

                                </div>
                            </form>
                        </div>

                    <!-- MODAL TAMBAH ANGGOTA BARU (KHUSUS ADMIN) -->
                    ${showAddModal && html`
                        <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <form onSubmit=${handleAddNewMember} class="bg-white p-6 rounded-[2.5rem] max-w-sm w-full shadow-2xl border space-y-4 max-h-[90vh] overflow-y-auto no-scrollbar">
                                <h3 class="font-black text-slate-800 text-lg">Tambah Anggota Baru</h3>
                                
                                <div class="space-y-3">
                                    <div class="flex items-center gap-3">
                                        <div class="w-12 h-12 rounded-full border bg-slate-100 flex items-center justify-center relative overflow-hidden">

                                    <input placeholder="Password" type="password" value=${newUser.password} onInput=${e => setNewUser({...newUser, password: e.target.value})} class="w-full p-3 rounded-2xl bg-slate-50 border outline-none text-xs font-semibold" required />
                                    <input placeholder="Nomor WhatsApp" value=${newUser.phone} onInput=${e => setNewUser({...newUser, phone: e.target.value})} class="w-full p-3 rounded-2xl bg-slate-50 border outline-none text-xs font-semibold" required />
                                    
                                    <select value=${newUser.role} onChange=${e => setNewUser({...newUser, role: e.target.value})} class="w-full p-3 rounded-2xl bg-slate-50 border outline-none text-xs font-semibold">

                                        <option value="admin">Administrator / HRD</option>
                                    </select>

                                    <input placeholder="Jabatan (Posisi)" value=${newUser.pos} onInput=${e => setNewUser({...newUser, pos: e.target.value})} class="w-full p-3 rounded-2xl bg-slate-50 border outline-none text-xs font-semibold" required />
                                    <input placeholder="Divisi" value=${newUser.div} onInput=${e => setNewUser({...newUser, div: e.target.value})} class="w-full p-3 rounded-2xl bg-slate-50 border outline-none text-xs font-semibold" required />
                                </div>

                                <div class="grid grid-cols-2 gap-2 pt-2">
                                    <button type="button" onClick=${() => setShowAddModal(false)} class="p-3 bg-slate-100 text-slate-700 rounded-xl text-xs font-bold uppercase tracking-wider">Batal</button>
                                    <button type="submit" class="p-3 bg-emerald-600 text-white rounded-xl text-xs font-bold uppercase tracking-wider">Tambahkan</button>
                                </div>
                            </form>
                        </div>
                    `}
                </div>
            `;
        }

        function DatabasePage({ users, att, tasks, ann, isCloudConnected, onResetCloud, notify }) {
            const [searchTerm, setSearchTerm] = useState('');
            const [filterTab, setFilterTab] = useState('all');

            const handleExportData = () => {
                const csvRows = [];
                csvRows.push("Kategori,ID,Detail Utama,Detail Tambahan,Tanggal/Waktu");
                
                users.forEach(u => csvRows.push(`Karyawan,${u.id},${u.name},${u.email} - ${u.pos},${u.joinDate}`));
                att.forEach(a => csvRows.push(`Presensi,${a.id},${a.userName},${a.type} - ${a.notes.replace(/,/g, '')},${a.time}`));
                tasks.forEach(t => csvRows.push(`Tugas,${t.id},${t.title},PIC: ${t.assignedName} - Status: ${t.status},Deadline: ${t.deadline}`));
                ann.forEach(a => csvRows.push(`Pengumuman,${a.id},${a.title},Oleh: ${a.author},${a.date}`));

                const csvContent = "data:text/csv;charset=utf-8," + csvRows.join("\n");
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `Laporan_SalesTrack_Keseluruhan_${new Date().toISOString().slice(0,10)}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                notify("Ekspor CSV Laporan Berhasil!");
            };

            return html`
                <div class="space-y-6">
                    <div class="flex justify-between items-center flex-wrap gap-3">
                        <div>
                            <h3 class="text-xl font-black text-slate-800">Laporan & Database Keseluruhan</h3>
                            <p class="text-xs text-slate-400">Ringkasan data aktivitas seluruh tim operasional secara real-time</p>
                        </div>
                        <button onClick=${handleExportData} class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold rounded-xl shadow-md transition-all">
                            <i class="fas fa-file-csv mr-1"></i> Unduh Laporan CSV
                        </button>
                    </div>

                    <!-- KONEKSI INTEGRASI DATABASE AWAN OTOMATIS -->
                    <div class="bg-gradient-to-r ${isCloudConnected ? 'from-emerald-600 to-teal-700' : 'from-amber-600 to-orange-700'} p-6 rounded-[2.5rem] text-white shadow-xl space-y-4">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="bg-white/20 text-white px-3 py-1 rounded-full text-[9px] font-bold uppercase tracking-wider">${isCloudConnected ? 'Cloud Terpadu' : 'Mode Sinkron Lokal'}</span>
                                <h4 class="text-lg font-black mt-2">${isCloudConnected ? 'Koneksi Server Otomatis Aktif' : 'Server Berjalan dalam Mode Lokal'}</h4>
                                <p class="text-xs text-white/90 leading-relaxed max-w-xl">
                                    ${isCloudConnected ? 'Semua data disinkronkan secara langsung di latar belakang melalui database awan terpusat yang aman.' : 'Data saat ini tersimpan di browser perangkat ini saja. Hubungkan database awan Firebase untuk mensinkronkan data antar perangkat HP & PC Admin secara real-time.'}
                                </p>
                            </div>
                            <div class="p-3 bg-white/10 rounded-2xl flex items-center gap-2 border border-white/20">
                                <span class="w-3.5 h-3.5 ${isCloudConnected ? 'bg-emerald-400 animate-ping' : 'bg-amber-400'} rounded-full"></span>
                                <span class="text-xs font-black">${isCloudConnected ? 'Live Sync' : 'Offline'}</span>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="bg-white p-5 rounded-[2rem] border shadow-sm space-y-3">
                            <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Statistik Kehadiran Bulanan</h4>
                            <div class="flex items-end gap-2 h-32 pt-4">
                                <div class="flex-1 bg-indigo-200 h-[40%] rounded-t-lg relative group"><span class="absolute bottom-full left-1/2 -translate-x-1/2 text-[9px] font-bold text-slate-500 opacity-0 group-hover:opacity-100 transition-all">40%</span></div>
                                <div class="flex-1 bg-indigo-200 h-[60%] rounded-t-lg relative group"><span class="absolute bottom-full left-1/2 -translate-x-1/2 text-[9px] font-bold text-slate-500 opacity-0 group-hover:opacity-100 transition-all">60%</span></div>
                                <div class="flex-1 bg-indigo-200 h-[50%] rounded-t-lg relative group"><span class="absolute bottom-full left-1/2 -translate-x-1/2 text-[9px] font-bold text-slate-500 opacity-0 group-hover:opacity-100 transition-all">50%</span></div>
                                <div class="flex-1 bg-indigo-600 h-[95%] rounded-t-lg relative group"><span class="absolute bottom-full left-1/2 -translate-x-1/2 text-[9px] font-bold text-indigo-700 opacity-100">95%</span></div>
                            </div>
                            <div class="flex justify-between text-[9px] font-bold text-slate-400 uppercase border-t pt-2">
                                <span>M1</span>
                                <span>M2</span>
                                <span>M3</span>
                                <span class="text-indigo-600 font-extrabold">Hari Ini</span>
                            </div>
                        </div>

                        <div class="bg-white p-5 rounded-[2rem] border shadow-sm space-y-3">
                            <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Analisis KPI Tim Sales</h4>
                            <div class="space-y-2 text-xs">
                                <div class="flex justify-between">
                                    <span class="font-bold text-slate-600">Kehadiran Harian</span>
                                    <span class="font-extrabold text-indigo-900">${att.length} Absensi</span>
                                </div>
                                <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                    <div class="bg-emerald-500 h-full" style="width: 85%"></div>
                                </div>
                                <div class="flex justify-between mt-2">
                                    <span class="font-bold text-slate-600">Tugas Diselesaikan</span>
                                    <span class="font-extrabold text-indigo-900">${tasks.filter(t => t.status === 'Selesai').length} / ${tasks.length} Tugas</span>
                                </div>
                                <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                    <div class="bg-indigo-600 h-full" style="width: ${tasks.length ? (tasks.filter(t => t.status === 'Selesai').length / tasks.length) * 100 : 0}%"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- PENELUSURAN DATA TIM -->
                    <div class="bg-white p-6 rounded-[2.5rem] border shadow-sm space-y-4">
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                            <div class="relative flex-1 max-w-sm">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400"><i class="fas fa-search text-xs"></i></span>
                                <input type="text" placeholder="Cari nama, tugas, atau presensi..." value=${searchTerm} onInput=${e => setSearchTerm(e.target.value)} class="w-full pl-9 pr-4 py-2.5 bg-slate-50 border rounded-2xl outline-none text-xs font-semibold focus:border-indigo-500 transition-all" />
                            </div>
                            <div class="flex gap-1.5 overflow-x-auto no-scrollbar">
                                <button onClick=${() => setFilterTab('all')} class="px-3 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-wider border ${filterTab === 'all' ? 'bg-indigo-950 text-white border-indigo-950' : 'bg-slate-50 text-slate-400'}">Semua</button>
                                <button onClick=${() => setFilterTab('att')} class="px-3 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-wider border ${filterTab === 'att' ? 'bg-indigo-950 text-white border-indigo-950' : 'bg-slate-50 text-slate-400'}">Presensi</button>
                                <button onClick=${() => setFilterTab('tasks')} class="px-3 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-wider border ${filterTab === 'tasks' ? 'bg-indigo-950 text-white border-indigo-950' : 'bg-slate-50 text-slate-400'}">Tugas</button>
                            </div>
                        </div>

                        <!-- TABEL DATA LENGKAP -->
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-xs">
                                <thead>
                                    <tr class="bg-slate-50 border-b text-slate-400 uppercase tracking-widest text-[9px] font-bold">
                                        <th class="p-3">Kategori</th>
                                        <th class="p-3">Detail Utama</th>
                                        <th class="p-3">Keterangan</th>
                                        <th class="p-3">Waktu/Batas</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y font-semibold text-slate-600">
                                    ${(filterTab === 'all' || filterTab === 'att') && att
                                        .filter(a => a.userName.toLowerCase().includes(searchTerm.toLowerCase()) || a.notes.toLowerCase().includes(searchTerm.toLowerCase()))
                                        .map(a => html`
                                        <tr class="hover:bg-slate-50/40">
                                            <td class="p-3"><span class="px-2 py-0.5 bg-emerald-100 text-emerald-800 rounded-full text-[8px] uppercase font-bold">Presensi</span></td>
                                            <td class="p-3 font-bold text-slate-800">${a.userName}</td>
                                            <td class="p-3 truncate max-w-[150px]">${a.type} - ${a.notes}</td>
                                            <td class="p-3 text-indigo-700 font-bold">${a.time}</td>
                                        </tr>
                                    `)}
                                    ${(filterTab === 'all' || filterTab === 'tasks') && tasks
                                        .filter(t => t.title.toLowerCase().includes(searchTerm.toLowerCase()) || t.assignedName.toLowerCase().includes(searchTerm.toLowerCase()))
                                        .map(t => html`
                                        <tr class="hover:bg-slate-50/40">
                                            <td class="p-3"><span class="px-2 py-0.5 bg-indigo-100 text-indigo-800 rounded-full text-[8px] uppercase font-bold">Tugas</span></td>
                                            <td class="p-3 font-bold text-slate-800">${t.title}</td>
                                            <td class="p-3">PIC: ${t.assignedName} (${t.status})</td>
                                            <td class="p-3 text-rose-600 font-bold">${t.deadline}</td>
                                        </tr>
                                    `)}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        function NavBtn({ icon, label, active, onClick }) {
            return html`
                <button onClick=${onClick} class="flex items-center gap-3 w-full p-3 rounded-xl transition-all font-bold text-xs ${active ? 'bg-indigo-900 text-indigo-200' : 'text-indigo-400 hover:bg-indigo-900/30'}">
                    <i class="fas ${icon} text-sm"></i>
                    <span>${label}</span>
                </button>
            `;
        }

        function MobileNavBtn({ icon, label, active, onClick }) {
            return html`
                <button onClick=${onClick} class="flex flex-col items-center justify-center p-2 rounded-xl flex-1 transition-all ${active ? 'text-indigo-600' : 'text-slate-400'}">
                    <i class="fas ${icon} text-base"></i>
                    <span class="text-[9px] font-black uppercase mt-1 tracking-tighter">${label}</span>
                </button>
            `;
        }

        preact.render(html`<${App} />`, document.getElementById('root'));
    </script>
</body>
</html>
