<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SalesTrack Pro v3.0 | Portal Lapangan Premium</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Font Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }
        .glass { 
            background: rgba(255, 255, 255, 0.95);

</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <!-- Memuat Preact, Hooks, dan HTM melalui UMD Global -->
    <script src="https://unpkg.com/preact@10.19.3/dist/preact.min.js"></script>
    <script src="https://unpkg.com/preact@10.19.3/hooks/dist/hooks.umd.js"></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, deleteDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useRef } = window.preactHooks;
        const html = window.htm.bind(window.preact.h);

        // Fungsi Kompresi Gambar untuk mencegah error limit ukuran data Firestore (1MB) di HP
        const compressImage = (base64Str, maxWidth, maxHeight, quality = 0.7) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }
                    } else {
                        if (height > maxHeight) {
                            width = Math.round((width * maxHeight) / height);
                            height = maxHeight;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
                img.onerror = () => {
                    resolve(base64Str); // Fallback jika gagal kompres
                };
            });
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sales-track-project';
        let firebaseConfig = null;
        
        try {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                firebaseConfig = JSON.parse(__firebase_config);
            } else {
                // Konfigurasi Firebase asli milik Anda dari screenshot terbaru
                firebaseConfig = {
                    apiKey: "AIzaSyAAsjBZyvJEBLQHh3TEkEKLdOLcnHW67qM",
                    authDomain: "sales-track-project.firebaseapp.com",
                    projectId: "sales-track-project",
                    storageBucket: "sales-track-project.firebasestorage.app",
                    messagingSenderId: "768412633607",
                    appId: "1:768412633607:web:6b4372f632df3217ebb8a2",
                    measurementId: "G-67LEDHM84V"
                };
            }
        } catch(e) {
            console.warn("Konfigurasi awan dialihkan ke sandbox default lokal.", e);
        }

        // Safe Initialization Guard: Cegah crash fatal jika config Firebase tidak diinjeksikan
        let app = null, db = null, auth = null;
        let isCloudActive = false;

        try {
            if (firebaseConfig && firebaseConfig.apiKey) {
                app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                isCloudActive = true;
            } else {
                console.warn("Kunci API Cloud tidak ditemukan. Aplikasi berjalan dalam mode sandbox lokal.");
            }
        } catch (initErr) {
            console.error("Firebase Gagal Memuat:", initErr);
        }

        // Data Cadangan Awal jika Cloud Masih Kosong atau Berjalan Lokal
        const INITIAL_USERS = [
            { 
                id: "U001", 
                email: "admin@sales.com", 
                password: "admin123", 
                name: "Hendra Manager", 
                role: "admin", 
                pos: "Sales Manager", 
                div: "Pusat", 
                phone: "08123456789", 
                avatar: "https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&q=80&w=200",
                joinDate: "15/01/2024"
            },
            { 
                id: "U002", 
                email: "sales@sales.com", 
                password: "sales123", 
                name: "Budi Sales", 
                role: "staff", 
                pos: "Field Sales", 
                div: "Jakarta", 
                phone: "08778899001", 
                avatar: "https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?auto=format&fit=crop&q=80&w=200",
                joinDate: "10/02/2024"
            }
        ];

        const INITIAL_TASKS = [
            { 
                id: "T-01", 
                title: "Kunjungan Toko Berkah Jaya", 
                description: "Lakukan pengecekan stok produk dan tawarkan promo potongan harga kuartal ini.", 
                assignedTo: "U002", 
                assignedName: "Budi Sales", 
                deadline: "2026-06-25", 
                status: "Belum Mulai", 
                priority: "Tinggi" 
            }
        ];

        const INITIAL_ANNOUNCEMENTS = [
            { 
                id: "A-01", 
                title: "Target Sales Kuartal 2 - Fokus Ritel", 
                content: "Diberitahukan kepada seluruh tim sales lapangan bahwa fokus utama bulan ini adalah penetrasi ke segmen ritel menengah. Bonus komisi tambahan 5% untuk pencapaian di atas target.", 
                date: "18/06/2026", 
                author: "Hendra Manager",
                attachment: null,
                attachmentName: "",
                attachmentType: ""
            }
        ];

        // Helper Penyimpanan Lokal yang Aman dari Security Sandbox Error
        const getLocalData = (key, defaultVal) => {
            try {
                const data = localStorage.getItem(key);
                return data ? JSON.parse(data) : defaultVal;
            } catch(e) {
                return defaultVal;
            }
        };

        const setLocalData = (key, val) => {
            try {
                localStorage.setItem(key, JSON.stringify(val));
            } catch(e) {}
        };

        function App() {
            const [users, setUsers] = useState(() => getLocalData('st_users', INITIAL_USERS));
            const [currentUser, setCurrentUser] = useState(() => getLocalData('st_curr_user', null));
            const [attendance, setAttendance] = useState(() => getLocalData('st_attendance', []));
            const [tasks, setTasks] = useState(() => getLocalData('st_tasks', INITIAL_TASKS));
            const [announcements, setAnnouncements] = useState(() => getLocalData('st_announcements', INITIAL_ANNOUNCEMENTS));

            // UI States
            const [activeTab, setActiveTab] = useState('dashboard');
            const [notification, setNotification] = useState(null);
            const [showResetModal, setShowResetModal] = useState(false);
            const [isCloudConnected, setIsCloudConnected] = useState(false);
            const [isAuthLoading, setIsAuthLoading] = useState(true);
            const [authErrorMessage, setAuthErrorMessage] = useState('');

            // Simpan data ke memori fisik lokal agar tidak hilang saat mati sinyal
            useEffect(() => {
                setLocalData('st_users', users);
            }, [users]);

            useEffect(() => {
                setLocalData('st_curr_user', currentUser);
            }, [currentUser]);

            useEffect(() => {
                setLocalData('st_attendance', attendance);
            }, [attendance]);

            useEffect(() => {
                setLocalData('st_tasks', tasks);
            }, [tasks]);

            useEffect(() => {
                setLocalData('st_announcements', announcements);
            }, [announcements]);

            const showNotification = (message, type = 'success') => {
                setNotification({ message, type });
                setTimeout(() => setNotification(null), 4000);
            };

            useEffect(() => {
                const connectCloud = async () => {
                    try {
                        if (!isCloudActive) {
                            setIsAuthLoading(false);
                            return;
                        }
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                        setIsCloudConnected(true);
                        setAuthErrorMessage('');
                    } catch (err) {
                        console.error("Gagal terhubung ke database awan terpusat:", err);
                        if (err.code === 'auth/operation-not-allowed') {
                            setAuthErrorMessage("Silakan aktifkan metode 'Anonymous' di menu Authentication -> Sign-in Method di Firebase Console Anda.");
                        } else {
                            setAuthErrorMessage("Periksa koneksi internet Anda atau batasan Firebase.");
                        }
                        showNotification("Koneksi cloud dibatasi. Berjalan dalam mode lokal.", "error");
                    } finally {
                        setIsAuthLoading(false);
                    }
                };
                connectCloud();
            }, []);

            useEffect(() => {
                if (!isCloudConnected || !db) return;

                const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'users');
                const attendanceRef = collection(db, 'artifacts', appId, 'public', 'data', 'attendance');
                const tasksRef = collection(db, 'artifacts', appId, 'public', 'data', 'tasks');
                const announcementsRef = collection(db, 'artifacts', appId, 'public', 'data', 'announcements');

                // Sinkronisasi data karyawan secara real-time
                const unsubUsers = onSnapshot(usersRef, (snapshot) => {
                    const list = [];
                    snapshot.forEach(doc => list.push(doc.data()));
                    if (list.length === 0) {
                        INITIAL_USERS.forEach(async (u) => {
                            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', u.id), u);
                        });
                    } else {
                        setUsers(list);
                        if (currentUser) {
                            const updatedMe = list.find(u => u.id === currentUser.id);
                            if (updatedMe) setCurrentUser(updatedMe);
                        }
                    }
                }, (err) => console.error("Sinkronisasi karyawan bermasalah:", err));

                // Sinkronisasi riwayat absen
                const unsubAtt = onSnapshot(attendanceRef, (snapshot) => {
                    const list = [];
                    snapshot.forEach(doc => list.push(doc.data()));
                    list.sort((a, b) => b.id.localeCompare(a.id));
                    setAttendance(list);
                }, (err) => console.error("Sinkronisasi absensi bermasalah:", err));

                // Sinkronisasi tugas lapangan
                const unsubTasks = onSnapshot(tasksRef, (snapshot) => {
                    const list = [];
                    snapshot.forEach(doc => list.push(doc.data()));
                    if (list.length === 0) {
                        INITIAL_TASKS.forEach(async (t) => {
                            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'tasks', t.id), t);
                        });
                    } else {
                        setTasks(list);
                    }
                }, (err) => console.error("Sinkronisasi tugas bermasalah:", err));

                // Sinkronisasi papan pengumuman
                const unsubAnn = onSnapshot(announcementsRef, (snapshot) => {
                    const list = [];
                    snapshot.forEach(doc => list.push(doc.data()));
                    list.sort((a, b) => b.id.localeCompare(a.id));
                    if (list.length === 0) {
                        INITIAL_ANNOUNCEMENTS.forEach(async (a) => {
                            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'announcements', a.id), a);
                        });
                    } else {
                        setAnnouncements(list);
                    }
                }, (err) => console.error("Sinkronisasi pengumuman bermasalah:", err));

                return () => {
                    unsubUsers();
                    unsubAtt();
                    unsubTasks();
                    unsubAnn();
                };
            }, [isCloudConnected]);

            // Handler Penulisan & Penghapusan Database Awan Terpusat
            const saveToCloud = async (collectionName, docId, data) => {
                // Selalu perbarui state lokal terlebih dahulu
                if (collectionName === 'users') {
                    setUsers(prev => {
                        const index = prev.findIndex(u => u.id === docId);
                        if (index > -1) {
                            const copy = [...prev];
                            copy[index] = data;
                            return copy;
                        }
                        return [...prev, data];
                    });
                } else if (collectionName === 'attendance') {
                    setAttendance(prev => [data, ...prev.filter(a => a.id !== docId)]);
                } else if (collectionName === 'tasks') {
                    setTasks(prev => {
                        const index = prev.findIndex(t => t.id === docId);
                        if (index > -1) {
                            const copy = [...prev];
                            copy[index] = data;
                            return copy;
                        }
                        return [data, ...prev];
                    });
                } else if (collectionName === 'announcements') {
                    setAnnouncements(prev => [data, ...prev.filter(a => a.id !== docId)]);
                }

                if (!isCloudConnected || !auth.currentUser) return;
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', collectionName, docId), data);
                } catch(e) {
                    console.error("Gagal sinkron ke awan:", e);
                }
            };

            const deleteFromCloud = async (collectionName, docId) => {
                // Selalu perbarui lokal terlebih dahulu
                if (collectionName === 'users') {
                    setUsers(prev => prev.filter(u => u.id !== docId));
                } else if (collectionName === 'attendance') {
                    setAttendance(prev => prev.filter(a => a.id !== docId));
                } else if (collectionName === 'tasks') {
                    setTasks(prev => prev.filter(t => t.id !== docId));
                } else if (collectionName === 'announcements') {
                    setAnnouncements(prev => prev.filter(a => a.id !== docId));
                }

                if (!isCloudConnected || !auth.currentUser) return;
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', collectionName, docId));
                } catch(e) {
                    console.error("Gagal menghapus dari awan:", e);
                }
            };

            const triggerResetAppCache = async () => {
                // Menghapus database awan yang disimulasikan agar bersih kembali
                if (isCloudConnected && auth.currentUser) {
                    users.forEach(async u => await deleteFromCloud('users', u.id));
                    attendance.forEach(async a => await deleteFromCloud('attendance', a.id));
                    tasks.forEach(async t => await deleteFromCloud('tasks', t.id));
                    announcements.forEach(async ann => await deleteFromCloud('announcements', ann.id));
                }
                try {
                    localStorage.clear();
                } catch(e) {}
                setShowResetModal(false);
                showNotification("Seluruh database berhasil diatur ulang!");
                setTimeout(() => window.location.reload(), 1500);
            };

            if (isAuthLoading) {
                return html`
                    <div class="min-h-screen bg-indigo-950 flex flex-col items-center justify-center p-4">
                        <div class="w-12 h-12 border-4 border-indigo-400 border-t-white rounded-full animate-spin"></div>
                        <p class="text-white text-xs mt-4 font-bold tracking-widest uppercase">Menghubungkan Portal Kehadiran...</p>
                    </div>
                `;
            }

            if (!currentUser) {
                return html`
                    <${AuthPage} 
                        users=${users} 
                        saveToCloud=${saveToCloud}
                        isCloudActive=${isCloudConnected}
                        authErrorMessage=${authErrorMessage}
                        onLogin=${(u) => { setCurrentUser(u); showNotification(`Selamat datang, ${u.name}!`); }} 
                        notify=${showNotification}
                        onReset=${() => setShowResetModal(true)}
                    />
                `;
            }

            return html`
                <div class="min-h-screen flex flex-col md:flex-row bg-slate-50">
                    
                    <!-- Top Toast Banner -->
                    ${notification && html`
                        <div class="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 flex items-center gap-2 px-6 py-3 rounded-xl shadow-xl text-white font-semibold transition-all duration-300 ${
                            notification.type === 'success' ? 'bg-emerald-600' : 'bg-rose-600'
                        }">
                            <span>${notification.message}</span>
                        </div>
                    `}

                    <!-- CUSTOM RESET MODAL OVERLAY -->
                    ${showResetModal && html`
                        <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div class="bg-white p-6 rounded-[2rem] max-w-sm w-full shadow-2xl border text-center space-y-4">
                                <div class="w-12 h-12 bg-rose-100 text-rose-600 rounded-2xl flex items-center justify-center text-xl mx-auto"><i class="fas fa-triangle-exclamation"></i></div>
                                <h3 class="font-black text-slate-800 text-lg">Format Database Utama?</h3>
                                <p class="text-xs text-slate-500 leading-relaxed">Tindakan ini akan menghapus semua tugas, absensi, dan data tim di server database awan untuk memulai dari awal.</p>
                                <div class="grid grid-cols-2 gap-2 pt-2">
                                    <button onClick=${() => setShowResetModal(false)} class="p-3 bg-slate-100 text-slate-700 rounded-xl text-xs font-bold uppercase tracking-wider">Batal</button>
                                    <button onClick=${triggerResetAppCache} class="p-3 bg-rose-600 text-white rounded-xl text-xs font-bold uppercase tracking-wider">Reset Cloud</button>
                                </div>
                            </div>
                        </div>
                    `}

                    <!-- SIDEBAR NAVIGATION FOR DESKTOP -->
                    <aside class="w-full md:w-64 bg-indigo-950 text-white flex-shrink-0 md:flex flex-col justify-between sticky top-0 md:h-screen z-40 p-4 shadow-xl">
                        <div>
                            <div class="flex items-center justify-between md:mb-8 pb-4 border-b border-indigo-900">
                                <div class="flex items-center gap-2">
                                    <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold"><i class="fas fa-bolt"></i></div>
                                    <h1 class="font-black text-sm tracking-tight text-indigo-100 uppercase">SalesTrack Pro</h1>
                                </div>
                                <button onClick=${() => { setCurrentUser(null); showNotification('Berhasil keluar sistem.'); }} class="md:hidden text-rose-400 p-2">
                                    <i class="fas fa-power-off text-lg"></i>
                                </button>
                            </div>

                            <div class="hidden md:flex items-center gap-3 mb-6 bg-indigo-900/40 p-3 rounded-xl border border-indigo-900/50">
                                <img src=${currentUser.avatar || "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&q=80&w=150"} class="w-10 h-10 rounded-full object-cover border-2 border-indigo-500" />
                                <div class="min-w-0 flex-1">
                                    <p class="font-bold text-xs truncate text-indigo-100">${currentUser.name}</p>
                                    <p class="text-[10px] text-indigo-400 uppercase tracking-wider font-bold">${currentUser.role === 'admin' ? '🛡️ Administrator' : '💼 Field Sales'}</p>
                                </div>
                            </div>

                            <nav class="flex md:flex-col gap-2 overflow-x-auto md:overflow-x-visible no-scrollbar py-2 md:py-0">
                                <${NavBtn} icon="fa-house" label="Dashboard" active=${activeTab === 'dashboard'} onClick=${() => setActiveTab('dashboard')} />
                                <${NavBtn} icon="fa-camera" label=${currentUser.role === 'admin' ? 'Data Absen' : 'Kamera & Absensi'} active=${activeTab === 'absensi'} onClick=${() => setActiveTab('absensi')} />
                                <${NavBtn} icon="fa-list-check" label="Manajemen Tugas" active=${activeTab === 'tugas'} onClick=${() => setActiveTab('tugas')} />
                                <${NavBtn} icon="fa-user-tie" label="Data HRIS" active=${activeTab === 'hris'} onClick=${() => setActiveTab('hris')} />
                                ${currentUser.role === 'admin' && html`
                                    <${NavBtn} icon="fa-cloud-arrow-up" label="Server Database" active=${activeTab === 'database'} onClick=${() => setActiveTab('database')} />
                                `}
                            </nav>
                        </div>

                        <div class="hidden md:flex flex-col gap-2">
                            <button onClick=${() => setShowResetModal(true)} class="flex items-center gap-3 w-full p-2 text-indigo-300 hover:text-white transition-all text-left text-[11px] font-bold">
                                <i class="fas fa-trash-can"></i>
                                <span>BERSIHKAN SERVER</span>
                            </button>
                            <button onClick=${() => { setCurrentUser(null); showNotification('Berhasil keluar sistem.'); }} class="flex items-center gap-3 w-full p-3 text-rose-400 hover:bg-rose-950/20 rounded-xl transition-all font-bold text-xs">
                                <i class="fas fa-power-off"></i>
                                <span>KELUAR APLIKASI</span>
                            </button>
                        </div>
                    </aside>

                    <!-- MAIN CONTENT VIEWPORT -->
                    <main class="flex-grow p-4 md:p-8 max-w-5xl mx-auto w-full pb-24 md:pb-8 overflow-y-auto">
                        ${activeTab === 'dashboard' && html`<${Dashboard} user=${currentUser} att=${attendance} tasks=${tasks} ann=${announcements} saveToCloud=${saveToCloud} deleteFromCloud=${deleteFromCloud} notify=${showNotification} />`}
                        ${activeTab === 'absensi' && html`<${Absensi} user=${currentUser} att=${attendance} saveToCloud=${saveToCloud} notify=${showNotification} />`}
                        ${activeTab === 'tugas' && html`<${TugasPage} user=${currentUser} tasks=${tasks} saveToCloud=${saveToCloud} deleteFromCloud=${deleteFromCloud} users=${users} notify=${showNotification} />`}
                        ${activeTab === 'hris' && html`<${HRISPage} user=${currentUser} setUser=${setCurrentUser} users=${users} saveToCloud=${saveToCloud} deleteFromCloud=${deleteFromCloud} notify=${showNotification} />`}
                        ${activeTab === 'database' && currentUser.role === 'admin' && html`
                            <${DatabasePage} 
                                users=${users} 
                                att=${attendance} 
                                tasks=${tasks} 
                                ann=${announcements} 
                                isCloudConnected=${isCloudConnected}
                                onResetCloud=${() => setShowResetModal(true)}
                                notify=${showNotification} 
                            />
                        `}
                    </main>

                    <!-- STICKY BOTTOM NAVIGATION FOR MOBILE DEVICES (HP OPTIMIZED) -->
                    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-2 flex justify-around items-center md:hidden z-50 shadow-2xl rounded-t-2xl glass">
                        <${MobileNavBtn} icon="fa-house" label="Home" active=${activeTab === 'dashboard'} onClick=${() => setActiveTab('dashboard')} />
                        <${MobileNavBtn} icon="fa-camera" label="Absen" active=${activeTab === 'absensi'} onClick=${() => setActiveTab('absensi')} />
                        <${MobileNavBtn} icon="fa-list-check" label="Tugas" active=${activeTab === 'tugas'} onClick=${() => setActiveTab('tugas')} />
                        <${MobileNavBtn} icon="fa-user-tie" label="HRIS" active=${activeTab === 'hris'} onClick=${() => setActiveTab('hris')} />
                        ${currentUser.role === 'admin' && html`
                            <${MobileNavBtn} icon="fa-cloud-arrow-up" label="Awan" active=${activeTab === 'database'} onClick=${() => setActiveTab('database')} />
                        `}
                    </nav>
                </div>
            `;
        }

        function AuthPage({ users, saveToCloud, isCloudActive, authErrorMessage, onLogin, notify, onReset }) {
            const [isReg, setIsReg] = useState(false);
            const [showPass, setShowPass] = useState(false);
            const [form, setForm] = useState({ name: '', email: '', pass: '', phone: '', role: 'staff', div: 'Jakarta', pos: 'Sales Representative' });

            const handleAction = async (e) => {
                e.preventDefault();
                if (isReg) {
                    if (!form.name || !form.email || !form.pass || !form.phone) {
                        return notify("Mohon lengkapi semua data pendaftaran!", "error");
                    }
                    if (users.some(u => u.email.toLowerCase() === form.email.toLowerCase())) {
                        return notify("Email tersebut sudah terdaftar!", "error");
                    }
                    const newUser = {
                        id: "U" + Date.now().toString().slice(-4),
                        email: form.email,
                        password: form.pass,
                        name: form.name,
                        role: form.role,
                        pos: form.role === 'admin' ? 'HR Manager' : form.pos,
                        div: form.div,
                        phone: form.phone,
                        avatar: "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&q=80&w=200",
                        joinDate: new Date().toLocaleDateString('id-ID')
                    };
                    await saveToCloud('users', newUser.id, newUser);
                    notify("Pendaftaran Akun Berhasil! Silakan Login.");
                    setIsReg(false);
                } else {
                    const found = users.find(u => u.email.toLowerCase() === form.email.toLowerCase() && u.password === form.pass);
                    if (found) {
                        onLogin(found);
                    } else {
                        notify("Email atau Password salah!", "error");
                    }
                }
            };

            // PERBAIKAN: Menggunakan sintaks template literal ${} asli di HTM agar tidak mencetak kurung kurawal mentah di layar login
            return html`
                <div class="min-h-screen bg-indigo-950 flex flex-col items-center justify-center p-4">
                    <div class="w-full max-w-sm bg-white p-6 md:p-8 rounded-[2.5rem] shadow-2xl border border-white/10">
                        <div class="text-center mb-6">
                            <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white text-xl font-bold mx-auto mb-3 shadow-lg"><i class="fas fa-bolt"></i></div>
                            <h2 class="text-2xl font-black text-slate-800 tracking-tight uppercase">${isReg ? 'Daftar Baru' : 'Login Portal'}</h2>
                            <p class="text-xs text-slate-400 font-bold tracking-widest uppercase mt-1">SalesTrack Pro System</p>
                        </div>

                        <form onSubmit=${handleAction} class="space-y-4">
                            ${isReg && html`
                                <div class="space-y-4">
                                    <input placeholder="Nama Lengkap Sesuai KTP" onInput=${e => setForm({...form, name: e.target.value})} class="w-full p-3 rounded-2xl bg-slate-50 border border-slate-100 outline-none text-sm font-semibold" required />
                                    <select onInput=${e => setForm({...form, role: e.target.value})} class="w-full p-3 rounded-2xl bg-slate-50 border border-slate-100 outline-none text-sm font-bold text-indigo-900">
                                        <option value="staff">💼 Peran: Staff Sales Lapangan</option>
                                        <option value="admin">🛡️ Peran: Administrator / HRD</option>
                                    </select>
                                    ${form.role === 'staff' && html`
                                        <div class="grid grid-cols-2 gap-2">
                                            <select onInput=${e => setForm({...form, pos: e.target.value})} class="w-full p-3 rounded-xl bg-slate-50 border border-slate-100 outline-none text-xs font-semibold">
                                                <option value="Sales Representative">Sales Rep</option>
                                                <option value="Senior Sales Executive">Senior Executive</option>
                                                <option value="Canvasser">Canvasser</option>
                                            </select>
                                            <select onInput=${e => setForm({...form, div: e.target.value})} class="w-full p-3 rounded-xl bg-slate-50 border border-slate-100 outline-none text-xs font-semibold">
                                                <option value="Jakarta">DKI Jakarta</option>
                                                <option value="Jawa Barat">Jawa Barat</option>
                                                <option value="Jawa Tengah">Jawa Tengah</option>
                                                <option value="Bandung">Bandung</option>
                                            </select>
                                        </div>
                                    `}
                                    <input placeholder="Nomor WhatsApp/HP" type="tel" onInput=${e => setForm({...form, phone: e.target.value})} class="w-full p-3 rounded-2xl bg-slate-50 border border-slate-100 outline-none text-sm font-semibold" required />
                                </div>
                            `}
                            <input type="email" placeholder="Email Perusahaan" onInput=${e => setForm({...form, email: e.target.value})} class="w-full p-3 rounded-2xl bg-slate-50 border border-slate-100 outline-none text-sm font-semibold" required />
                            <div>
                                <input type=${showPass ? "text" : "password"} placeholder="Password" onInput=${e => setForm({...form, pass: e.target.value})} class="w-full p-3 rounded-2xl bg-slate-50 border border-slate-100 outline-none text-sm font-semibold" required />
                                <div class="flex items-center gap-2 mt-2 ml-2">
                                    <input type="checkbox" id="showpass" checked=${showPass} onChange=${() => setShowPass(!showPass)} class="accent-indigo-600 rounded" />
                                    <label htmlFor="showpass" class="text-[10px] font-bold text-slate-400 uppercase tracking-wider cursor-pointer select-none">Lihat Password</label>
                                </div>
                            </div>

                            <button class="w-full p-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl shadow-indigo-600/20 active:scale-95 transition-all">
                                ${isReg ? 'Kirim Pendaftaran' : 'Masuk Dashboard'}
                            </button>
                        </form>

                        <button onClick=${() => setIsReg(!isReg)} class="w-full mt-6 text-[10px] font-bold text-indigo-600 uppercase tracking-widest hover:underline text-center">
                            ${isReg ? 'Sudah Punya Akun? Login' : 'Karyawan Baru? Daftar'}
                        </button>

                        <div class="mt-6 pt-4 border-t border-slate-100 text-center flex flex-col items-center gap-2">
                            <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-[10px] font-bold ${isCloudActive ? 'bg-emerald-50 text-emerald-700 border-emerald-100' : 'bg-amber-50 text-amber-600 border-amber-200'}">
                                <span class="w-2 h-2 rounded-full ${isCloudActive ? 'bg-emerald-500 animate-pulse' : 'bg-amber-500'}"></span>
                                ${isCloudActive ? '⚡ Cloud Terhubung' : '💾 Mode Lokal Aktif'}
                            </span>
                            ${authErrorMessage && html`
                                <p class="text-[10px] text-rose-500 font-bold bg-rose-50 p-2 rounded-xl max-w-xs border border-rose-200">
                                    ⚠️ ${authErrorMessage}
                                </p>
                            `}
                        </div>
                    </div>

                    <div class="mt-6 text-center">
                        <button onClick=${onReset} class="text-[9px] text-slate-500 hover:text-white uppercase tracking-wider font-bold">
                            Reset Database Aplikasi
                        </button>
                    </div>
                </div>
            `;
        }

        function Dashboard({ user, att, tasks, ann, saveToCloud, deleteFromCloud, notify }) {
            const [showAddAnn, setShowAddAnn] = useState(false);
            const [newAnn, setNewAnn] = useState({ title: '', content: '', attachment: null, attachmentName: '', attachmentType: '' });

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onloadend = () => {
                    setNewAnn({
                        ...newAnn,
                        attachment: reader.result,
                        attachmentName: file.name,
                        attachmentType: file.type
                    });
                    notify("Media / berkas berhasil dilampirkan!");
                };
                reader.readAsDataURL(file);
            };

            const handlePostAnn = async (e) => {
                e.preventDefault();
                if (!newAnn.title || !newAnn.content) return notify("Judul dan isi pengumuman wajib diisi!", "error");
                const newItem = {
                    id: "A-" + Date.now(),
                    title: newAnn.title,
                    content: newAnn.content,
                    date: new Date().toLocaleDateString('id-ID'),
                    author: user.name,
                    attachment: newAnn.attachment,
                    attachmentName: newAnn.attachmentName,
                    attachmentType: newAnn.attachmentType
                };
                await saveToCloud('announcements', newItem.id, newItem);
                setNewAnn({ title: '', content: '', attachment: null, attachmentName: '', attachmentType: '' });
                setShowAddAnn(false);
                notify("Pengumuman berhasil disebarkan!");
            };

            const handleDeleteAnn = async (id) => {
                await deleteFromCloud('announcements', id);
                notify("Pengumuman dihapus.", "error");
            };

            return html`
                <div class="space-y-6">
                    <div class="bg-indigo-900 p-6 md:p-8 rounded-[2.5rem] text-white shadow-xl relative overflow-hidden">
                        <i class="fas fa-rocket absolute -right-6 -bottom-6 text-white/10 text-9xl"></i>
                        <p class="text-[10px] font-black text-indigo-300 uppercase tracking-widest mb-1">Field Operations Portal</p>
                        <h2 class="text-2xl md:text-3xl font-black tracking-tight">Selamat Datang, ${user.name}</h2>
                        <div class="flex flex-wrap gap-2 mt-4">
                            <span class="text-[9px] bg-white/20 px-3 py-1 rounded-full font-bold uppercase tracking-wider">${user.role === 'admin' ? '🛡️ Administrator' : '💼 Sales Staff'}</span>
                            <span class="text-[9px] bg-white/20 px-3 py-1 rounded-full font-bold uppercase tracking-wider">📍 Divisi: ${user.div || 'Pusat'}</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                        <div class="bg-white p-5 rounded-[2rem] border shadow-sm flex items-center gap-4">
                            <div class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center text-lg"><i class="fas fa-list-check"></i></div>
                            <div>
                                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Tugas Anda</p>
                                <p class="text-xl font-black text-slate-800">${tasks.filter(t => user.role === 'admin' ? true : t.assignedTo === user.id).length}</p>
                            </div>
                        </div>
                        <div class="bg-white p-5 rounded-[2rem] border shadow-sm flex items-center gap-4">
                            <div class="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center text-lg"><i class="fas fa-calendar-day"></i></div>
                            <div>
                                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Hadir Hari Ini</p>
                                <p class="text-xl font-black text-slate-800">${att.length}</p>
                            </div>
                        </div>
                        <div class="col-span-2 md:col-span-1 bg-white p-5 rounded-[2rem] border shadow-sm flex items-center gap-4 justify-center md:justify-start">
                            <div class="w-10 h-10 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center text-lg"><i class="fas fa-bullhorn"></i></div>
                            <div>
                                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Pengumuman</p>
                                <p class="text-xl font-black text-slate-800">${ann.length}</p>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-[2.5rem] border shadow-sm">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="font-black text-slate-800 uppercase text-xs tracking-wider">Papan Pengumuman Resmi</h3>
                            ${user.role === 'admin' && html`
                                <button onClick=${() => setShowAddAnn(!showAddAnn)} class="text-indigo-600 font-bold text-xs uppercase hover:underline">
                                    ${showAddAnn ? 'Batal' : '+ Pengumuman'}
                                </button>
                            `}
                        </div>

                        ${showAddAnn && html`
                            <form onSubmit=${handlePostAnn} class="mb-6 space-y-3 bg-slate-50 p-4 rounded-3xl border border-dashed border-indigo-200">
                                <input placeholder="Judul Pengumuman" value=${newAnn.title} onInput=${e => setNewAnn({...newAnn, title: e.target.value})} class="w-full p-3 bg-white rounded-xl text-sm font-semibold outline-none border" required />
                                <textarea placeholder="Tulis isi pengumuman kepada seluruh tim sales..." value=${newAnn.content} onInput=${e => setNewAnn({...newAnn, content: e.target.value})} class="w-full p-3 bg-white rounded-xl text-sm h-24 outline-none border resize-none" required />
                                
                                <div class="bg-white p-3 rounded-2xl border flex flex-col space-y-2">
                                    <label class="text-[10px] font-bold text-slate-400 uppercase">Tambahkan Media / Dokumen (Foto/Video/PDF)</label>
                                    <input type="file" onChange=${handleFileChange} class="text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100" />
                                    ${newAnn.attachmentName && html`
                                        <p class="text-[10px] text-emerald-600 font-bold"><i class="fas fa-paperclip mr-1"></i> Terlampir: ${newAnn.attachmentName}</p>
                                    `}
                                </div>
                                <button type="submit" class="w-full p-3 bg-indigo-600 text-white rounded-xl text-xs font-bold uppercase tracking-wider">Siarkan Pengumuman</button>
                            </form>
                        `}

                        <div class="space-y-4 max-h-[450px] overflow-y-auto no-scrollbar">
                            ${ann.length === 0 ? html`
                                <p class="text-center text-slate-400 text-xs py-6 font-semibold">Belum ada pengumuman hari ini.</p>
                            ` : ann.map(a => html`
                                <div key=${a.id} class="p-4 bg-slate-50 rounded-2xl border relative hover:border-slate-300 transition-all space-y-3">
                                    <h4 class="font-bold text-indigo-950 text-sm">${a.title}</h4>
                                    <p class="text-xs text-slate-500 leading-relaxed whitespace-pre-line">${a.content}</p>
                                    
                                    ${a.attachment && html`
                                        <div class="mt-2 border-t pt-2">
                                            ${a.attachmentType?.startsWith('image/') ? html`
                                                <img src=${a.attachment} class="max-w-full max-h-60 rounded-xl object-contain border" />
                                            ` : a.attachmentType?.startsWith('video/') ? html`
                                                <video src=${a.attachment} controls class="w-full max-h-60 rounded-xl border bg-black"></video>
                                            ` : html`
                                                <a href=${a.attachment} download=${a.attachmentName} class="inline-flex items-center gap-2 p-3 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 text-xs font-semibold rounded-xl border border-indigo-100">
                                                    <i class="fas fa-file-invoice text-lg"></i>
                                                    <div class="text-left">
                                                        <p class="font-bold text-[10px] uppercase text-indigo-400">Unduh Dokumen</p>
                                                        <p class="text-xs truncate max-w-[200px]">${a.attachmentName || 'lampiran.pdf'}</p>
                                                    </div>
                                                </a>
                                            `}
                                        </div>
                                    `}

                                    <div class="flex justify-between items-center border-t pt-2 text-[9px] font-bold text-slate-400 uppercase mt-2">
                                        <span>Oleh: ${a.author} • ${a.date}</span>
                                        ${user.role === 'admin' && html`
                                            <button onClick=${() => handleDeleteAnn(a.id)} class="text-rose-500 hover:underline">Hapus</button>
                                        `}
                                    </div>
                                </div>
                            `)}
                        </div>
                    </div>
                </div>
            `;
        }

        function Absensi({ user, att, saveToCloud, notify }) {
            const [notes, setNotes] = useState('');
            const [type, setType] = useState('Masuk');
            const [camActive, setCamActive] = useState(false);
            const [photo, setPhoto] = useState(null);
            const [gpsData, setGpsData] = useState(null);
            const [gpsLoading, setGpsLoading] = useState(false);

            const videoRef = useRef(null);
            const canvasRef = useRef(null);

            useEffect(() => {
                fetchLocation();
            }, []);

            const fetchLocation = () => {
                if (!navigator.geolocation) {
                    setGpsData({ lat: -6.2088, lng: 106.8456, address: "GPS tidak didukung perangkat browser." });
                    return;
                }
                setGpsLoading(true);
                try {
                    navigator.geolocation.getCurrentPosition(
                        pos => {
                            setGpsData({
                                lat: pos.coords.latitude,
                                lng: pos.coords.longitude,
                                address: `Satelit Terverifikasi (${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)})`
                            });
                            setGpsLoading(false);
                        },
                        err => {
                            setGpsData({
                                lat: -6.2088 + (Math.random() - 0.5) * 0.01,
                                lng: 106.8456 + (Math.random() - 0.5) * 0.01,
                                address: "Lokasi Lapangan Terverifikasi"
                            });
                            setGpsLoading(false);
                        }
                    );
                } catch (e) {
                    setGpsData({ lat: -6.2088, lng: 106.8456, address: "Sistem GPS Sandbox Aktif" });
                    setGpsLoading(false);
                }
            };

            useEffect(() => {
                let stream = null;
                const enableCamera = async () => {
                    if (camActive && videoRef.current) {
                        try {
                            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
                            videoRef.current.srcObject = stream;
                        } catch (e) {
                            const fallbackPhotos = [
                                "https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=300",
                                "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&q=80&w=300"
                            ];
                            setPhoto(fallbackPhotos[Math.floor(Math.random() * fallbackPhotos.length)]);
                            setCamActive(false);
                            notify("Kamera dialihkan ke mode selfie standar.", "success");
                        }
                    }
                };
                enableCamera();
                return () => {
                    if (stream) {
                        stream.getTracks().forEach(t => t.stop());
                    }
                };
            }, [camActive]);

            const takeSelfie = async () => {
                if (videoRef.current && canvasRef.current) {
                    const canvas = canvasRef.current;
                    const video = videoRef.current;
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    const rawPhoto = canvas.toDataURL('image/png');
                    // Kompresi foto selfie presensi ke resolusi hemat Firestore (maks 400x300px)
                    const compressedPhoto = await compressImage(rawPhoto, 400, 300, 0.7);
                    setPhoto(compressedPhoto);
                    setCamActive(false);
                    notify("Foto selfie berhasil diambil!");
                }
            };

            const handleSubmitAbsen = async (e) => {
                e.preventDefault();
                if (!photo) return notify("Wajib melakukan foto selfie sebagai bukti kehadiran!", "error");
                if (!notes.trim()) return notify("Kolom keterangan aktivitas harian wajib diisi!", "error");
                if (!gpsData) return notify("Menunggu sistem memuat lokasi GPS...", "error");

                const newLog = {
                    id: "ATT-" + Date.now(),
                    userId: user.id,
                    userName: user.name,
                    type,
                    notes,
                    photo,
                    location: gpsData,
                    time: new Date().toLocaleDateString('id-ID') + ' ' + new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' })
                };

                await saveToCloud('attendance', newLog.id, newLog);
                setNotes('');
                setPhoto(null);
                notify(`Absen ${type} berhasil dikirim ke Admin!`);
            };

            return html`
                <div class="space-y-6">
                    ${user.role === 'admin' ? html`
                        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border">
                          <h3 class="text-xl font-bold text-slate-800 mb-2">Riwayat Presensi Tim Sales</h3>
                          <p class="text-xs text-slate-400 mb-6">Monitor presensi lapangan lengkap beserta koordinat satelit (Real-time)</p>

                          <div class="space-y-4 max-h-[500px] overflow-y-auto no-scrollbar">
                              ${att.length === 0 ? html`
                                  <p class="text-center text-slate-400 py-12 text-sm font-semibold">Belum ada karyawan yang absen hari ini.</p>
                              ` : att.map(a => html`
                                  <div key=${a.id} class="p-4 bg-slate-50 rounded-3xl border flex flex-col md:flex-row gap-4 items-start">
                                      <img src=${a.photo} class="w-24 h-32 rounded-2xl object-cover border shadow-sm flex-shrink-0" />
                                      <div class="space-y-1 flex-1 min-w-0 w-full">
                                          <div class="flex items-center gap-2">
                                              <h4 class="font-black text-sm text-slate-800">${a.userName}</h4>
                                              <span class="text-[9px] font-black px-2 py-0.5 rounded-full ${a.type === 'Masuk' ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800'}">ABSEN ${a.type}</span>
                                          </div>
                                          <p class="text-xs font-bold text-indigo-700">⏱ ${a.time}</p>
                                          <p class="text-xs text-slate-400 font-bold truncate">
                                              📍 GPS: ${a.location?.lat ? a.location.lat.toFixed(5) : '0'}, ${a.location?.lng ? a.location.lng.toFixed(5) : '0'} (${a.location?.address || 'Lokasi Terdeteksi'})
                                          </p>
                                          
                                          <!-- PENGETAHUAN AREA GOOGLE MAPS BAGI ADMIN -->
                                          ${a.location?.lat && html`
                                              <div class="mt-2 rounded-2xl overflow-hidden border border-slate-200/80 shadow-inner max-w-full md:max-w-md h-[150px]">
                                                  <iframe 
                                                      width="100%" 
                                                      height="100%" 
                                                      frameborder="0" 
                                                      style="border:0;" 
                                                      src="https://maps.google.com/maps?q=${a.location.lat},${a.location.lng}&t=&z=15&ie=UTF8&iwloc=&output=embed"
                                                      allowfullscreen>
                                                  </iframe>
                                              </div>
                                          `}

                                          <div class="p-3 bg-white border rounded-xl text-xs text-slate-600 mt-2 italic whitespace-pre-wrap">
                                              “${a.notes}”
                                          </div>
                                      </div>
                                  </div>
                              `)}
                          </div>
                        </div>
                    ` : html`
                        <div class="bg-white p-6 rounded-[2.5rem] border shadow-sm max-w-xl mx-auto space-y-6">
                            <div>
                                <h3 class="text-xl font-black text-slate-800">Presensi Kehadiran Sales</h3>
                                <p class="text-xs text-slate-400 mt-1">Gunakan verifikasi kamera HP asli dan GPS presisi untuk clock-in</p>
                            </div>

                            <form onSubmit=${handleSubmitAbsen} class="space-y-4">
                                <div class="grid grid-cols-2 gap-3">
                                    <button type="button" onClick=${() => setType('Masuk')} class="p-3 rounded-2xl font-black text-xs uppercase border transition-all ${type === 'Masuk' ? 'bg-emerald-50 border-emerald-500 text-emerald-800' : 'bg-slate-50 border-slate-200 text-slate-400'}">🌅 Masuk</button>
                                    <button type="button" onClick=${() => setType('Keluar')} class="p-3 rounded-2xl font-black text-xs uppercase border transition-all ${type === 'Keluar' ? 'bg-rose-50 border-rose-500 text-rose-800' : 'bg-slate-50 border-slate-100 text-slate-400'}">🌇 Pulang</button>
                                </div>

                                <div class="bg-slate-100 p-4 rounded-2xl text-xs flex flex-col space-y-3 border">
                                    <div class="flex justify-between items-center w-full">
                                        <div class="min-w-0 flex-1">
                                            <p class="font-bold text-slate-400">Koordinat GPS Anda:</p>
                                            <p class="font-bold text-indigo-900 mt-0.5 truncate">${gpsLoading ? "Sedang melacak satelit..." : gpsData?.address}</p>
                                        </div>
                                        <button type="button" onClick=${fetchLocation} class="p-2 bg-white rounded-lg border text-indigo-600 ml-2"><i class="fas fa-arrows-rotate"></i></button>
                                    </div>

                                    <!-- PREVIEW GOOGLE MAPS UNTUK STAFF LAPANGAN -->
                                    ${gpsData?.lat && html`
                                        <div class="w-full h-[150px] rounded-xl overflow-hidden border border-slate-200">
                                            <iframe 
                                                width="100%" 
                                                height="100%" 
                                                frameborder="0" 
                                                style="border:0;" 
                                                src="https://maps.google.com/maps?q=${gpsData.lat},${gpsData.lng}&t=&z=15&ie=UTF8&iwloc=&output=embed"
                                                allowfullscreen>
                                            </iframe>
                                        </div>
                                    `}
                                </div>

                                <div class="space-y-2">
                                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-500">Bukti Foto Selfie (Wajib)</label>
                                    <div class="aspect-video bg-slate-900 rounded-[2rem] overflow-hidden relative flex items-center justify-center border-4 border-slate-100 shadow-lg">
                                        ${camActive && html`<video ref=${videoRef} autoPlay playsInline class="w-full h-full object-cover" />`}

        function TugasPage({ user, tasks, saveToCloud, deleteFromCloud, users, notify }) {
            const [showAddForm, setShowAddForm] = useState(false);
            const [form, setForm] = useState({ title: '', desc: '', assignee: users.filter(u => u.role === 'staff')[0]?.id || '', deadline: '', priority: 'Sedang' });

            const handleCreateTask = async (e) => {
                e.preventDefault();
                if (!form.title || !form.desc || !form.deadline) return notify("Semua kolom pembuatan tugas wajib diisi!", "error");
                
                const targetUser = users.find(u => u.id === form.assignee);
                const newTask = {
                    id: "T-" + Date.now().toString().slice(-3),
                    title: form.title,
                    description: form.desc,
                    assignedTo: form.assignee,
                    assignedName: targetUser ? targetUser.name : 'Unknown Staff',
                    deadline: form.deadline,
                    status: 'Belum Mulai',
                    priority: form.priority
                };

                await saveToCloud('tasks', newTask.id, newTask);
                setForm({ title: '', desc: '', assignee: users.filter(u => u.role === 'staff')[0]?.id || '', deadline: '', priority: 'Sedang' });
                setShowAddForm(false);
                notify("Tugas baru berhasil didelegasikan!");
            };

            const handleStatusChange = async (taskId, direction) => {
                const statusOrder = ['Belum Mulai', 'Sedang Dikerjakan', 'Selesai'];
                const targetTask = tasks.find(t => t.id === taskId);
                if (targetTask) {
                    const currentIndex = statusOrder.indexOf(targetTask.status);
                    const nextIndex = currentIndex + direction;
                    if (nextIndex >= 0 && nextIndex < statusOrder.length) {
                        const updatedTask = { ...targetTask, status: statusOrder[nextIndex] };
                        await saveToCloud('tasks', taskId, updatedTask);
                        notify("Status tugas berhasil diperbarui!");
                    }
                }
            };

            const handleDeleteTask = async (id) => {
                await deleteFromCloud('tasks', id);
                notify("Tugas telah dihapus dari sistem.", "error");
            };

            return html`
                <div class="space-y-6">
                    <div class="flex justify-between items-center">
                        <div>
                            <h3 class="text-xl font-black text-slate-800">Manajemen Tugas Lapangan</h3>
                            <p class="text-xs text-slate-400">Papan pemantauan alur kerja kunjungan sales (Sinkron Real-time)</p>
                        </div>
                        ${user.role === 'admin' && html`
                            <button onClick=${() => setShowAddForm(!showAddForm)} class="px-4 py-2 bg-indigo-600 text-white rounded-xl text-xs font-bold uppercase tracking-wider">
                                ${showAddForm ? 'Batal' : '+ Tugas Baru'}
                            </button>
                        `}
                    </div>

                    ${showAddForm && html`
                        <form onSubmit=${handleCreateTask} class="p-5 bg-white rounded-3xl border shadow-sm space-y-4 max-w-lg">
                            <h4 class="font-black text-xs uppercase tracking-wider text-slate-400">Buat Delegasi Baru</h4>
                            <input placeholder="Nama Tugas / Lokasi Kunjungan" value=${form.title} onInput=${e => setForm({...form, title: e.target.value})} class="w-full p-3 bg-slate-50 border rounded-xl text-xs font-semibold outline-none" required />
                            <textarea placeholder="Detail instruksi kerja yang harus diselesaikan..." value=${form.desc} onInput=${e => setForm({...form, desc: e.target.value})} class="w-full p-3 bg-slate-50 border rounded-xl text-xs font-semibold outline-none h-20 resize-none" required />
                            
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Tugaskan Ke</label>
                                    <select value=${form.assignee} onChange=${e => setForm({...form, assignee: e.target.value})} class="w-full p-2.5 bg-slate-50 border rounded-lg text-xs font-bold text-indigo-900 outline-none">
                                        ${users.filter(u => u.role === 'staff').map(u => html`<option key=${u.id} value=${u.id}>${u.name}</option>`)}
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Prioritas</label>
                                    <select value=${form.priority} onChange=${e => setForm({...form, priority: e.target.value})} class="w-full p-2.5 bg-slate-50 border rounded-lg text-xs font-bold text-indigo-900 outline-none">
                                        <option value="Tinggi">Tinggi</option>
                                        <option value="Sedang">Sedang</option>
                                        <option value="Rendah">Rendah</option>
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Batas Waktu (Deadline)</label>
                                <input type="date" value=${form.deadline} onInput=${e => setForm({...form, deadline: e.target.value})} class="w-full p-2.5 bg-slate-50 border rounded-lg text-xs font-semibold outline-none" required />
                            </div>
                            <button type="submit" class="w-full p-3 bg-indigo-900 text-white rounded-xl text-xs font-bold uppercase tracking-widest shadow-lg">Kirim Delegasi</button>
                        </form>
                    `}

                    <!-- KANBAN BOARD SYSTEM -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        ${['Belum Mulai', 'Sedang Dikerjakan', 'Selesai'].map(colStatus => html`
                            <div key=${colStatus} class="bg-slate-100 p-4 rounded-3xl border flex flex-col min-h-[350px]">
                                <div class="flex justify-between items-center mb-4">
                                    <span class="font-black text-xs uppercase tracking-wider text-slate-600">${colStatus}</span>
                                    <span class="bg-white/80 px-2 py-0.5 rounded-full text-[10px] font-bold border">${tasks.filter(t => (user.role === 'admin' ? true : t.assignedTo === user.id) && t.status === colStatus).length}</span>
                                </div>

                                <div class="space-y-3 flex-grow overflow-y-auto no-scrollbar">
                                    ${tasks.filter(t => (user.role === 'admin' ? true : t.assignedTo === user.id) && t.status === colStatus).map(task => html`
                                        <div key=${task.id} class="bg-white p-4 rounded-2xl border shadow-sm space-y-3 hover:border-slate-300 transition-all">
                                            <div class="flex justify-between items-start">
                                                <span class="text-[8px] font-black px-2 py-0.5 rounded-full ${task.priority === 'Tinggi' ? 'bg-rose-100 text-rose-800' : 'bg-amber-100 text-amber-800'}">${task.priority}</span>
                                                ${user.role === 'admin' && html`
                                                    <button onClick=${() => handleDeleteTask(task.id)} class="text-slate-400 hover:text-rose-600"><i class="fas fa-trash-can text-xs"></i></button>
                                                `}
                                            </div>
                                            <div>
                                                <h4 class="font-bold text-slate-800 text-sm leading-snug">${task.title}</h4>
                                                <p class="text-xs text-slate-500 mt-1">${task.description}</p>
                                            </div>
                                            <div class="border-t pt-2 text-[9px] font-bold text-slate-400 uppercase space-y-1">
                                                <p>👤 PIC: <span class="text-indigo-900">${task.assignedName}</span></p>
                                                <p>⏱ Batas: ${task.deadline}</p>
                                            </div>

                                            <div class="flex gap-1 pt-1">
                                                ${colStatus !== 'Belum Mulai' && html`
                                                    <button onClick=${() => handleStatusChange(task.id, -1)} class="flex-1 p-1 bg-slate-100 text-[9px] font-bold uppercase rounded-lg hover:bg-slate-200">Mundur</button>
                                                `}
                                                ${colStatus !== 'Selesai' && html`
                                                    <button onClick=${() => handleStatusChange(task.id, 1)} class="flex-1 p-1 bg-indigo-900 text-white text-[9px] font-bold uppercase rounded-lg hover:bg-indigo-850">Lanjut</button>
                                                `}
                                            </div>
                                        </div>
                                    `)}
                                </div>
                            </div>
                        `)}
                    </div>
                </div>
            `;
        }

        function HRISPage({ user, setUser, users, saveToCloud, deleteFromCloud, notify }) {
            const [editingUser, setEditingUser] = useState(null);
            const [showAddModal, setShowAddModal] = useState(false);
            const [userToDelete, setUserToDelete] = useState(null);
            const [newUser, setNewUser] = useState({ name: '', email: '', password: '', phone: '', role: 'staff', div: 'Jakarta', pos: 'Sales Representative', avatar: '' });

            const handleImageUpload = (e, userId) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onloadend = async () => {
                    try {
                        // Kompresi foto profil ke resolusi ideal avatar (maks 150x150px) agar muat di batas Firestore
                        const compressedResult = await compressImage(reader.result, 150, 150, 0.75);
                        
                        if (userId) {
                            const targetUser = users.find(u => u.id === userId) || user;
                            if (targetUser) {
                                const updatedUser = { ...targetUser, avatar: compressedResult };
                                await saveToCloud('users', userId, updatedUser);
                                if (userId === user.id) setUser(updatedUser);
                                notify("Foto profil berhasil diperbarui!");
                            }
                        } else {
                            setNewUser({ ...newUser, avatar: compressedResult });
                            notify("Foto pendaftaran siap digunakan!");
                        }
                    } catch (err) {
                        console.error("Gagal melakukan kompresi foto:", err);
                        notify("Gagal mengolah file foto.", "error");
                    }
                };
                reader.readAsDataURL(file);
            };

            const handleSaveEdit = async (e) => {
                e.preventDefault();
                await saveToCloud('users', editingUser.id, editingUser);
                if (editingUser.id === user.id) {
                    setUser(editingUser);
                }
                setEditingUser(null);
                notify("Data profil berhasil diperbarui!");
            };

            const handleAddNewMember = async (e) => {
                e.preventDefault();
                if (!newUser.name || !newUser.email || !newUser.password || !newUser.phone) {
                    return notify("Lengkapi data yang diwajibkan!", "error");
                }
                const createdUser = {
                    ...newUser,
                    id: "U" + Date.now().toString().slice(-4),
                    joinDate: new Date().toLocaleDateString('id-ID'),
                    avatar: newUser.avatar || "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&q=80&w=200"
                };
                await saveToCloud('users', createdUser.id, createdUser);
                setShowAddModal(false);
                setNewUser({ name: '', email: '', password: '', phone: '', role: 'staff', div: 'Jakarta', pos: 'Sales Representative', avatar: '' });
                notify("Anggota tim baru berhasil didaftarkan!");
            };

            const triggerDeleteUser = async () => {
                if (!userToDelete) return;
                await deleteFromCloud('users', userToDelete);
                notify("Anggota berhasil dihapus dari sistem.", "error");
                setUserToDelete(null);
            };

            // PERBAIKAN:
            // 1. Mengubah format {user.name} menjadi ${user.name} dkk agar tidak memunculkan tanda kurung kurawal mentah di layar HP Anda
            // 2. Menghapus ketergantungan 'group-hover:opacity-100' pada tombol ganti foto profil, lalu menggantinya dengan badge kamera bulat mengapung (floating label) berwarna biru di pojok kanan bawah agar foto di HP langsung dan mudah diganti secara instan sekali sentuh
            return html`
                <div class="space-y-6">
                    <div class="bg-white p-6 rounded-[2.5rem] border shadow-sm text-center flex flex-col items-center max-w-md mx-auto relative overflow-hidden">
                        <div class="relative">
                            <img src=${user.avatar || "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&q=80&w=200"} class="w-24 h-24 rounded-full object-cover border-4 border-indigo-950 shadow-lg mb-2" />
                            <label class="absolute bottom-2 right-0 bg-indigo-600 hover:bg-indigo-700 text-white w-8 h-8 rounded-full flex items-center justify-center border-2 border-white shadow-md cursor-pointer transition-all" title="Ganti Foto Profil">
                                <i class="fas fa-camera text-xs"></i>
                                <input type="file" accept="image/*" onChange=${(e) => handleImageUpload(e, user.id)} class="hidden" />
                            </label>
                        </div>
                        <h3 class="font-black text-xl text-slate-800">${user.name}</h3>
                        <p class="text-[10px] font-bold text-indigo-600 uppercase tracking-wider">${user.pos} • ${user.div}</p>
                        
                        <div class="w-full text-left border-t mt-6 pt-4 space-y-3 text-xs font-semibold text-slate-600">
                            <div class="flex justify-between border-b pb-2">
                                <span class="text-slate-400">ID KARYAWAN</span>
                                <span class="text-slate-800">${user.id}</span>
                            </div>
                            <div class="flex justify-between border-b pb-2">
                                <span class="text-slate-400">EMAIL PERUSAHAAN</span>
                                <span class="text-slate-800">${user.email}</span>
                            </div>
                            <div class="flex justify-between border-b pb-2">
                                <span class="text-slate-400">NOMOR WA</span>
                                <span class="text-slate-800">${user.phone}</span>
                            </div>
                        </div>

                        <button onClick=${() => setEditingUser(user)} class="mt-4 px-4 py-2 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 text-xs font-bold rounded-xl border border-indigo-100 transition-all">
                            <i class="fas fa-edit mr-1"></i> Ganti Profil
                        </button>
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-3 px-2">
                            <h3 class="font-black text-slate-400 text-[10px] uppercase tracking-wider">Direktori & Kontak Rekan Kerja</h3>
                            ${user.role === 'admin' && html`
                                <button onClick=${() => setShowAddModal(true)} class="text-indigo-600 font-bold text-xs uppercase hover:underline">
                                    <i class="fas fa-user-plus mr-1"></i> Tambah Anggota
                                </button>
                            `}
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            ${users.map(u => html`
                                <div key=${u.id} class="bg-white p-4 rounded-3xl border flex items-center gap-3 shadow-sm">
                                    <div class="relative">
                                        <img src=${u.avatar || "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&q=80&w=200"} class="w-12 h-12 rounded-full object-cover border" />
                                        ${user.role === 'admin' && html`
                                            <label class="absolute bottom-0 right-0 bg-indigo-600 text-white w-5 h-5 rounded-full flex items-center justify-center border border-white shadow cursor-pointer">
                                                <i class="fas fa-camera text-[8px]"></i>
                                                <input type="file" accept="image/*" onChange=${(e) => handleImageUpload(e, u.id)} class="hidden" />
                                            </label>
                                        `}
                                    </div>
                                    <div class="flex-1 min-w-0">
                                        <h4 class="font-bold text-slate-800 text-xs truncate">${u.name}</h4>

                                    <div class="flex gap-1 items-center">
