<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SalesTrack Pro v2 | Full Operational</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htm/preact/standalone.umd.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .bg-login { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script>
        const { html, render, useState, useEffect, useRef } = htmPreact;

        // --- DATABASE LOCAL SIMULATION ---
        const INITIAL_USERS = [
            { id: "ADM-01", email: "admin@sales.com", password: "admin123", name: "Hendra Manager", role: "admin", pos: "Manager Operasional", div: "Pusat", phone: "08123456789", avatar: "https://i.pravatar.cc/150?u=ADM-01" },
            { id: "STF-01", email: "sales@sales.com", password: "sales123", name: "Budi Sales", role: "staff", pos: "Field Sales Representative", div: "Jakarta Barat", phone: "087788990011", avatar: "https://i.pravatar.cc/150?u=STF-01" }
        ];

        function App() {
            // Persistent States
            const [users, setUsers] = useState(() => JSON.parse(localStorage.getItem('st_users_v2')) || INITIAL_USERS);
            const [currentUser, setCurrentUser] = useState(() => JSON.parse(localStorage.getItem('st_curr_v2')) || null);
            const [attendance, setAttendance] = useState(() => JSON.parse(localStorage.getItem('st_att_v2')) || []);
            const [tasks, setTasks] = useState(() => JSON.parse(localStorage.getItem('st_tasks_v2')) || []);
            const [announcements, setAnnouncements] = useState(() => JSON.parse(localStorage.getItem('st_ann_v2')) || [
                { id: 1, title: "SOP Kunjungan Baru", content: "Setiap kunjungan wajib upload foto selfie depan toko.", date: "18/06/2026", author: "Hendra" }
            ]);

            const [activeTab, setActiveTab] = useState('dashboard');
            const [isRegistering, setIsRegistering] = useState(false);

            useEffect(() => {
                localStorage.setItem('st_users_v2', JSON.stringify(users));
                localStorage.setItem('st_curr_v2', JSON.stringify(currentUser));
                localStorage.setItem('st_att_v2', JSON.stringify(attendance));
                localStorage.setItem('st_tasks_v2', JSON.stringify(tasks));
                localStorage.setItem('st_ann_v2', JSON.stringify(announcements));
            }, [users, currentUser, attendance, tasks, announcements]);

            if (!currentUser) {
                return html`<${AuthPage} users=${users} setUsers=${setUsers} onLogin=${setCurrentUser} isReg=${isRegistering} setReg=${setIsRegistering} />`;
            }

            return html`
                <div class="min-h-screen flex flex-col">
                    <header class="bg-white p-4 px-6 flex justify-between items-center shadow-sm sticky top-0 z-50">
                        <div class="flex items-center gap-3">
                            <div class="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fas fa-bolt-lightning"></i></div>
                            <h1 class="font-extrabold text-indigo-950 tracking-tighter text-lg">SALESTRACK <span class="text-indigo-500">PRO</span></h1>
                        </div>
                        <button onClick=${() => setCurrentUser(null)} class="w-9 h-9 flex items-center justify-center bg-slate-100 text-slate-400 rounded-full hover:bg-rose-50 hover:text-rose-500 transition-colors">
                            <i class="fas fa-power-off"></i>
                        </button>
                    </header>

                    <main class="flex-1 p-5 max-w-lg mx-auto w-full pb-28">
                        ${activeTab === 'dashboard' && html`<${Dashboard} user=${currentUser} att=${attendance} tasks=${tasks} ann=${announcements} setAnn=${setAnnouncements} />`}
                        ${activeTab === 'absensi' && html`<${Absensi} user=${currentUser} att=${attendance} setAtt=${setAttendance} />`}
                        ${activeTab === 'tugas' && html`<${TugasPage} user=${currentUser} tasks=${tasks} setTasks=${setTasks} users=${users} />`}
                        ${activeTab === 'hris' && html`<${HRISPage} user=${currentUser} users=${users} />`}
                    </main>

                    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around p-3 z-50 shadow-2xl">
                        <NavBtn icon="fa-grid-2" label="Home" act=${activeTab==='dashboard'} click=${()=>setActiveTab('dashboard')} />
                        <NavBtn icon="fa-camera-retro" label="Absen" act=${activeTab==='absensi'} click=${()=>setActiveTab('absensi')} />
                        <NavBtn icon="fa-clipboard-list" label="Tugas" act=${activeTab==='tugas'} click=${()=>setActiveTab('tugas')} />
                        <NavBtn icon="fa-user-gear" label="HRIS" act=${activeTab==='hris'} click=${()=>setActiveTab('hris')} />
                    </nav>
                </div>
            `;
        }

        // --- NAVIGATION BUTTON ---
        function NavBtn({icon, label, act, click}) {
            return html`
                <button onClick=${click} class="flex flex-col items-center gap-1 py-1 px-4 transition-all ${act ? 'text-indigo-600' : 'text-slate-300'}">
                    <i class="fas ${icon} text-xl"></i>
                    <span class="text-[10px] font-bold uppercase tracking-widest">${label}</span>
                </button>
            `;
        }

        // --- AUTH PAGE (LOGIN & REGISTER) ---
        function AuthPage({users, setUsers, onLogin, isReg, setReg}) {
            const [form, setForm] = useState({ name: '', email: '', pass: '', role: 'staff', div: 'Jakarta', pos: 'Field Sales', phone: '' });
            const [showPass, setShowPass] = useState(false);

            const handleAuth = (e) => {
                e.preventDefault();
                if (isReg) {
                    if(!form.name || !form.email || !form.pass || !form.phone) return alert("Lengkapi data!");
                    const newUser = { ...form, id: "USR-"+Date.now(), password: form.pass, avatar: "https://i.pravatar.cc/150?u="+form.email };
                    setUsers([...users, newUser]);
                    alert("Akun berhasil dibuat! Silakan login.");
                    setReg(false);
                } else {
                    const found = users.find(u => u.email.toLowerCase() === form.email.toLowerCase() && u.password === form.pass);
                    if (found) onLogin(found); else alert("Email atau Password salah!");
                }
            };

            return html`
                <div class="min-h-screen bg-login flex items-center justify-center p-6 text-white">
                    <div class="w-full max-w-sm bg-white/10 glass p-8 rounded-[2.5rem] border border-white/20 shadow-2xl">
                        <div class="text-center mb-8">
                            <h2 class="text-3xl font-black tracking-tighter uppercase">${isReg ? 'Daftar Baru' : 'Login Portal'}</h2>
                            <p class="text-[10px] text-indigo-300 font-bold uppercase tracking-widest mt-1">Management & Tracking System</p>
                        </div>
                        
                        <form onSubmit=${handleAuth} class="space-y-4">
                            ${isReg && html`
                                <input placeholder="Nama Lengkap" onInput=${x=>setForm({...form, name: x.target.value})} class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none text-sm placeholder:text-white/40" required />
                                <select onInput=${x=>setForm({...form, role: x.target.value})} class="w-full p-4 rounded-2xl bg-slate-900 border border-white/10 outline-none text-sm">
                                    <option value="staff">Akses: Sales Staff</option>
                                    <option value="admin">Akses: Admin HRD</option>
                                </select>
                                <input placeholder="Nomor WhatsApp" onInput=${x=>setForm({...form, phone: x.target.value})} class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none text-sm placeholder:text-white/40" required />
                            `}
                            <input type="email" placeholder="Email Perusahaan" onInput=${x=>setForm({...form, email: x.target.value})} class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none text-sm placeholder:text-white/40" required />
                            
                            <div class="relative">
                                <input type=${showPass ? 'text' : 'password'} placeholder="Password" onInput=${x=>setForm({...form, pass: x.target.value})} class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none text-sm placeholder:text-white/40" required />
                                <div class="flex items-center gap-2 mt-3 ml-2">
                                    <input type="checkbox" id="showPass" class="accent-indigo-500" onChange=${()=>setShowPass(!showPass)} />
                                    <label for="showPass" class="text-[10px] font-bold text-white/60 uppercase">Lihat Password</label>
                                </div>
                            </div>
                            
                            <button class="w-full p-4 bg-indigo-500 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl active:scale-95 transition-all mt-4">
                                ${isReg ? 'Buat Akun' : 'Masuk Dashboard'}
                            </button>
                        </form>

                        <button onClick=${() => setReg(!isReg)} class="w-full mt-8 text-[10px] font-black text-indigo-300 uppercase tracking-widest text-center">
                            ${isReg ? 'Sudah punya akun? LOGIN' : 'Karyawan Baru? DAFTAR'}
                        </button>
                    </div>
                </div>
            `;
        }

        // --- DASHBOARD (HOME) ---
        function Dashboard({user, att, tasks, ann, setAnn}) {
            const [newAnn, setNewAnn] = useState({ title: '', content: '' });
            const [showForm, setShowForm] = useState(false);
            const today = new Date().toLocaleDateString('id-ID');

            const postAnn = () => {
                if(!newAnn.title || !newAnn.content) return alert("Lengkapi pengumuman!");
                setAnn([{ ...newAnn, id: Date.now(), date: today, author: user.name }, ...ann]);
                setNewAnn({ title: '', content: '' });
                setShowForm(false);
            };

            return html`
                <div class="space-y-6">
                    <div class="bg-indigo-700 p-8 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden">
                        <i class="fas fa-chart-line absolute -right-6 -bottom-6 text-white/10 text-9xl"></i>
                        <p class="text-[10px] font-bold opacity-60 uppercase tracking-widest mb-1">Status Operasional</p>
                        <h2 class="text-3xl font-black">${user.name}</h2>
                        <div class="flex gap-2 mt-4">
                            <span class="text-[9px] bg-white/20 px-3 py-1 rounded-full font-bold uppercase tracking-wider">${user.role}</span>
                            <span class="text-[9px] bg-white/20 px-3 py-1 rounded-full font-bold uppercase tracking-wider">${user.div}</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                            <div class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center mb-4"><i class="fas fa-list-check"></i></div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Tugas Anda</p>
                            <p class="text-3xl font-black text-indigo-950">${tasks.filter(t=> (user.role==='admin' ? true : t.assignedTo === user.id) && t.status !== 'Selesai').length}</p>
                        </div>
                        <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                            <div class="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center mb-4"><i class="fas fa-camera"></i></div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Hadir Hari Ini</p>
                            <p class="text-3xl font-black text-emerald-600">${att.filter(a=>a.date === today).length}</p>
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="font-black text-slate-800 uppercase text-xs">Papan Pengumuman</h3>
                            ${user.role === 'admin' && html`
                                <button onClick=${()=>setShowForm(!showForm)} class="text-indigo-600 text-xs font-bold uppercase tracking-tighter">
                                    ${showForm ? 'Batal' : '+ Pengumuman'}
                                </button>
                            `}
                        </div>

                        ${showForm && html`
                            <div class="mb-6 space-y-3 bg-slate-50 p-4 rounded-2xl">
                                <input placeholder="Judul Pengumuman" onInput=${x=>setNewAnn({...newAnn, title: x.target.value})} class="w-full p-3 rounded-xl border border-slate-200 text-sm outline-none" />
                                <textarea placeholder="Isi pesan..." onInput=${x=>setNewAnn({...newAnn, content: x.target.value})} class="w-full p-3 rounded-xl border border-slate-200 text-sm h-20 outline-none"></textarea>
                                <button onClick=${postAnn} class="w-full p-3 bg-indigo-600 text-white rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg">Posting Info</button>
                            </div>
                        `}

                        <div class="space-y-4">
                            ${ann.map(a => html`
                                <div class="p-4 bg-slate-50 rounded-2xl relative">
                                    <h4 class="font-bold text-sm text-indigo-900">${a.title}</h4>
                                    <p class="text-xs text-slate-500 mt-1 leading-relaxed">${a.content}</p>
                                    <div class="flex justify-between mt-3 text-[9px] font-bold text-slate-400 uppercase tracking-tighter">
                                        <span>Oleh: ${a.author}</span>
                                        <span>${a.date}</span>
                                    </div>
                                    ${user.role === 'admin' && html`
                                        <button onClick=${() => { if(confirm('Hapus?')) setAnn(ann.filter(x=>x.id!==a.id)) }} class="absolute top-3 right-3 text-slate-300 hover:text-rose-500"><i class="fas fa-trash-alt"></i></button>
                                    `}
                                </div>
                            `)}
                        </div>
                    </div>
                </div>
            `;
        }

        // --- ABSENSI (CAMERA & GPS) ---
        function Absensi({user, att, setAtt}) {
            const [photo, setPhoto] = useState(null);
            const [note, setNote] = useState('');
            const [loc, setLoc] = useState(null);
            const [camActive, setCamActive] = useState(false);
            const vRef = useRef(null);

            useEffect(() => {
                navigator.geolocation.getCurrentPosition(
                    p => setLoc({ lat: p.coords.latitude, lng: p.coords.longitude }),
                    () => setLoc("GPS ERROR")
                );
            }, []);

            const openCam = async () => {
                try {
                    setCamActive(true);
                    const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                    vRef.current.srcObject = s;
                } catch(e) { 
                    alert("Akses kamera ditolak browser HP. Izinkan akses di pengaturan!"); 
                    setCamActive(false);
                }
            };

            const capture = () => {
                const c = document.createElement('canvas');
                c.width = vRef.current.videoWidth; 
                c.height = vRef.current.videoHeight;
                c.getContext('2d').drawImage(vRef.current, 0, 0);
                setPhoto(c.toDataURL('image/png'));
                vRef.current.srcObject.getTracks().forEach(t => t.stop());
                setCamActive(false);
            };

            const submitAbsen = () => {
                if(!photo || !note) return alert("Foto & Catatan wajib!");
                const data = {
                    id: Date.now(),
                    name: user.name,
                    date: new Date().toLocaleDateString('id-ID'),
                    time: new Date().toLocaleTimeString('id-ID'),
                    photo, note, loc: loc ? `${loc.lat}, ${loc.lng}` : 'Tanpa GPS'
                };
                setAtt([data, ...att]);
                alert("Absensi Berhasil!");
                setPhoto(null); setNote('');
            };

            return html`
                <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-100 space-y-6">
                    <div class="border-b border-slate-50 pb-4">
                        <h3 class="font-black text-slate-800 text-lg uppercase tracking-tighter">Absensi Real-Time</h3>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Verify identity with Photo & GPS</p>
                    </div>

                    <div class="aspect-[3/4] bg-slate-900 rounded-[2rem] overflow-hidden relative shadow-2xl">
                        ${!photo ? html`
                            <video ref=${vRef} autoPlay playsInline class="w-full h-full object-cover" />
                            ${!camActive && html`
                                <div class="absolute inset-0 flex items-center justify-center">
                                    <button onClick=${openCam} class="bg-white text-indigo-600 p-4 rounded-full shadow-2xl"><i class="fas fa-camera text-2xl"></i></button>
                                </div>
                            `}
                        ` : html`
                            <img src=${photo} class="w-full h-full object-cover" />
                        `}
                        <div class="absolute bottom-4 left-4 bg-black/60 glass text-white text-[9px] px-3 py-1 rounded-full font-bold">📍 ${loc?.lat ? `${loc.lat.toFixed(5)}, ${loc.lng.toFixed(5)}` : 'Mencari GPS...'}</div>
                    </div>

                    <div class="flex gap-3">
                        ${camActive && !photo && html`<button onClick=${capture} class="flex-1 bg-emerald-500 text-white p-4 rounded-2xl font-black text-xs uppercase shadow-lg">Ambil Foto</button>`}
                        ${photo && html`<button onClick=${()=>setPhoto(null)} class="flex-1 bg-rose-50 text-rose-500 p-4 rounded-2xl font-bold text-xs uppercase">Hapus Foto</button>`}
                    </div>

                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Catatan Kunjungan (Wajib)</label>
                        <textarea value=${note} onInput=${x=>setNote(x.target.value)} placeholder="Tulis aktivitas..." class="w-full p-4 bg-slate-50 rounded-2xl h-24 text-sm outline-none focus:ring-2 focus:ring-indigo-100"></textarea>
                    </div>

                    <button onClick=${submitAbsen} class="w-full p-5 bg-indigo-950 text-white rounded-[2rem] font-black uppercase text-xs tracking-widest shadow-2xl transition-all active:scale-95">Kirim Kehadiran</button>

                    ${user.role === 'admin' && html`
                        <div class="mt-10 border-t border-slate-100 pt-8">
                            <h4 class="font-black text-slate-800 text-xs uppercase tracking-widest mb-6">Riwayat Seluruh Tim</h4>
                            <div class="space-y-4">
                                ${att.map(a => html`
                                    <div class="flex gap-4 p-4 bg-slate-50 rounded-3xl border border-slate-100">
                                        <img src=${a.photo} class="w-16 h-16 rounded-2xl object-cover shadow-sm" />
                                        <div class="flex-1">
                                            <p class="font-black text-indigo-950 text-xs uppercase">${a.name}</p>
                                            <p class="text-[9px] font-bold text-indigo-500">${a.time} • ${a.date}</p>
                                            <p class="text-[9px] text-slate-400 font-bold tracking-tighter">📍 ${a.loc}</p>
                                            <p class="text-[11px] text-slate-600 italic mt-2">"${a.note}"</p>
                                        </div>
                                    </div>
                                `)}
                            </div>
                        </div>
                    `}
                </div>
            `;
        }

        // --- MANAJEMEN TUGAS ---
        function TugasPage({user, tasks, setTasks, users}) {
            const [form, setForm] = useState({ title: '', deadline: '', target: users.find(u=>u.role==='staff')?.id || '' });

            const addTugas = () => {
                if(!form.title || !form.deadline) return alert("Isi lengkap!");
                const pelaksana = users.find(u=>u.id === form.target);
                const nT = { id: Date.now(), title: form.title, deadline: form.deadline, assignedTo: form.target, assignedName: pelaksana.name, status: 'Belum Mulai' };
                setTasks([nT, ...tasks]);
                alert("Tugas Terkirim!"); setForm({...form, title: ''});
            };

            return html`
                <div class="space-y-6">
                    ${user.role === 'admin' && html`
                        <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100 space-y-4">
                            <h3 class="font-black text-slate-800 uppercase text-xs">Delegasi Tugas Baru</h3>
                            <input value=${form.title} onInput=${x=>setForm({...form, title: x.target.value})} placeholder="Judul Tugas Kunjungan" class="w-full p-4 bg-slate-50 rounded-2xl text-sm outline-none" />
                            <div class="flex gap-3">
                                <input type="date" onInput=${x=>setForm({...form, deadline: x.target.value})} class="flex-1 p-4 bg-slate-50 rounded-2xl text-xs font-bold uppercase outline-none" />
                                <select onInput=${x=>setForm({...form, target: x.target.value})} class="flex-1 p-4 bg-slate-50 rounded-2xl text-[10px] font-bold uppercase">
                                    ${users.filter(u=>u.role==='staff').map(u => html`<option value=${u.id}>${u.name}</option>`)}
                                </select>
                            </div>
                            <button onClick=${addTugas} class="w-full p-4 bg-indigo-600 text-white rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-lg">Kirim Tugas Lapangan</button>
                        </div>
                    `}

                    <h3 class="font-black text-slate-400 uppercase text-[10px] tracking-widest px-2">Daftar Pekerjaan Lapangan</h3>

                    <div class="space-y-3">
                        ${tasks.filter(t => user.role === 'admin' ? true : t.assignedTo === user.id).map(t => html`
                            <div class="bg-white p-5 rounded-[2rem] border border-slate-100 flex justify-between items-center card-shadow">
                                <div>
                                    <p class="font-bold text-slate-800 text-sm">${t.title}</p>
                                    <p class="text-[9px] font-black text-indigo-400 uppercase tracking-widest mt-1">${t.status} • Sampai: ${t.deadline}</p>
                                    ${user.role === 'admin' && html`<p class="text-[8px] font-bold text-slate-300 uppercase">Pic: ${t.assignedName}</p>`}
                                </div>
                                ${t.status !== 'Selesai' && html`
                                    <button onClick=${() => setTasks(tasks.map(x => x.id === t.id ? {...x, status: 'Selesai'} : x))} class="w-10 h-10 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center shadow-inner">
                                        <i class="fas fa-check"></i>
                                    </button>
                                `}
                            </div>
                        `)}
                    </div>
                </div>
            `;
        }

        // --- HRIS & PROFILE ---
        function HRISPage({user, users}) {
            return html`
                <div class="space-y-6">
                    <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100 text-center flex flex-col items-center">
                        <img src=${user.avatar} class="w-28 h-28 rounded-full border-4 border-indigo-600 shadow-2xl object-cover mb-4" />
                        <h3 class="text-2xl font-black text-slate-800 tracking-tighter">${user.name}</h3>
                        <p class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest">${user.pos} • ${user.div}</p>
                        
                        <div class="w-full mt-10 grid grid-cols-1 gap-5 text-left border-t border-slate-50 pt-8">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-slate-400"><i class="fas fa-id-badge"></i></div>
                                <div><p class="text-[8px] font-black text-slate-400 uppercase tracking-widest">ID Karyawan</p><p class="text-sm font-bold text-slate-700 uppercase">${user.id}</p></div>
                            </div>
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-slate-400"><i class="fas fa-envelope"></i></div>
                                <div><p class="text-[8px] font-black text-slate-400 uppercase tracking-widest">Email Official</p><p class="text-sm font-bold text-slate-700">${user.email}</p></div>
                            </div>
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-slate-400"><i class="fas fa-phone"></i></div>
                                <div><p class="text-[8px] font-black text-slate-400 uppercase tracking-widest">WhatsApp</p><p class="text-sm font-bold text-slate-700">${user.phone}</p></div>
                            </div>
                        </div>
                    </div>

                    <h3 class="font-black text-slate-400 uppercase text-[10px] tracking-widest px-2 mt-8">Direktori Kontak Tim</h3>
                    <div class="grid grid-cols-1 gap-3">
                        ${users.map(u => html`
                            <div class="bg-white p-4 rounded-3xl border border-slate-100 flex items-center gap-4 card-shadow">
                                <img src=${u.avatar} class="w-11 h-11 rounded-full object-cover" />
                                <div class="flex-1">
                                    <p class="font-bold text-slate-800 text-sm tracking-tighter">${u.name}</p>
                                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">${u.pos}</p>
                                </div>
                                <a href="tel:${u.phone}" class="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center border border-emerald-100 shadow-sm"><i class="fas fa-phone-flip text-xs"></i></a>
                            </div>
                        `)}
                    </div>
                </div>
            `;
        }

        render(html`<${App} />`, document.getElementById('root'));
    </script>
</body>
</html>
