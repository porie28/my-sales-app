<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SalesTrack Pro v2.2 | Portal Lapangan Premium</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Font Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }
        .glass { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px); 
        }
        .no-scrollbar::-webkit-scrollbar { 
            display: none; 
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <!-- Memuat Preact, Hooks, dan HTM melalui UMD Global -->
    <script src="https://unpkg.com/preact@10.19.3/dist/preact.min.js"></script>
    <script src="https://unpkg.com/preact@10.19.3/hooks/dist/hooks.umd.js"></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>

    <script>
        const { useState, useEffect, useRef } = window.preactHooks;
        const html = window.htm.bind(window.preact.h);

        // Data Cadangan Awal jika Cloud Belum Terkoneksi
        const INITIAL_USERS = [
            { 
                id: "U001", 
                email: "admin@sales.com", 
                password: "admin123", 
                name: "Hendra Manager", 
                role: "admin", 
                pos: "Sales Manager", 
                div: "Pusat", 
                phone: "08123456789", 
                avatar: "https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&q=80&w=200",
                joinDate: "15/01/2024"
            },
            { 
                id: "U002", 
                email: "sales@sales.com", 
                password: "sales123", 
                name: "Budi Sales", 
                role: "staff", 
                pos: "Field Sales", 
                div: "Jakarta", 
                phone: "08778899001", 
                avatar: "https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?auto=format&fit=crop&q=80&w=200",
                joinDate: "10/02/2024"
            }
        ];

        const INITIAL_TASKS = [
            { 
                id: "T-01", 
                title: "Kunjungan Toko Berkah Jaya", 
                description: "Lakukan pengecekan stok produk dan tawarkan promo potongan harga kuartal ini.", 
                assignedTo: "U002", 
                assignedName: "Budi Sales", 
                deadline: "2026-06-25", 
                status: "Belum Mulai", 
                priority: "Tinggi" 
            }
        ];

        const INITIAL_ANNOUNCEMENTS = [
            { 
                id: "A-01", 
                title: "Target Operasional Juni", 
                content: "Fokus peningkatan penetrasi produk baru ke sektor ritel tradisional wilayah Jakarta.", 
                date: "18/06/2026", 
                author: "Hendra Manager",
                attachment: null,
                attachmentName: "",
                attachmentType: ""
            }
        ];

        // Penanganan Error Penyimpanan Lokal Sandbox
        const safeGetItem = (key, fallback) => {
            try {
                const value = localStorage.getItem(key);
                return value ? JSON.parse(value) : fallback;
            } catch (e) {
                console.warn("Akses penyimpanan lokal dibatasi. Menggunakan buffer memori.", e);
                return fallback;
            }
        };

        const safeSetItem = (key, value) => {
            try {
                localStorage.setItem(key, JSON.stringify(value));
            } catch (e) {
                // Diabaikan secara aman jika terisolasi sandbox
            }
        };

        function App() {
            const [users, setUsers] = useState(() => safeGetItem('st_users_v2.2', INITIAL_USERS));
            const [currentUser, setCurrentUser] = useState(() => safeGetItem('st_curr_v2.2', null));
            const [attendance, setAttendance] = useState(() => safeGetItem('st_att_v2.2', []));
            const [tasks, setTasks] = useState(() => safeGetItem('st_tasks_v2.2', INITIAL_TASKS));
            const [announcements, setAnnouncements] = useState(() => safeGetItem('st_ann_v2.2', INITIAL_ANNOUNCEMENTS));
            const [gsheetUrl, setGsheetUrl] = useState(() => safeGetItem('st_gsheet_url_v2.2', ''));

            // UI States
            const [activeTab, setActiveTab] = useState('dashboard');
            const [notification, setNotification] = useState(null);
            const [showResetModal, setShowResetModal] = useState(false);
            const [isAutoSyncing, setIsAutoSyncing] = useState(false);

            // Penyinkronan otomatis data state ke memori penyimpanan lokal HP
            useEffect(() => {
                safeSetItem('st_users_v2.2', users);
                safeSetItem('st_curr_v2.2', currentUser);
                safeSetItem('st_att_v2.2', attendance);
                safeSetItem('st_tasks_v2.2', tasks);
                safeSetItem('st_ann_v2.2', announcements);
                safeSetItem('st_gsheet_url_v2.2', gsheetUrl);
            }, [users, currentUser, attendance, tasks, announcements, gsheetUrl]);

            // FITUR SOLUSI AUTO-PULL: Lakukan sinkronisasi otomatis dari cloud saat aplikasi dibuka
            useEffect(() => {
                if (gsheetUrl) {
                    autoPullFromCloud();
                }
            }, [gsheetUrl]);

            const autoPullFromCloud = async () => {
                setIsAutoSyncing(true);
                try {
                    const response = await fetch(gsheetUrl);
                    const data = await response.json();
                    if (data && data.users && data.tasks) {
                        setUsers(data.users);
                        setAttendance(data.attendance || []);
                        setTasks(data.tasks);
                        setAnnouncements(data.announcements || []);
                        
                        // Perbarui data user saat ini jika ada perubahan biodata dari pusat
                        if (currentUser) {
                            const updatedMe = data.users.find(u => u.id === currentUser.id);
                            if (updatedMe) setCurrentUser(updatedMe);
                        }
                        console.log("Database awan berhasil diperbarui secara otomatis!");
                    }
                } catch (e) {
                    console.warn("Auto-Pull ditangguhkan: Menunggu jaringan stabil atau otorisasi.", e);
                } finally {
                    setIsAutoSyncing(false);
                }
            };

            const showNotification = (message, type = 'success') => {
                setNotification({ message, type });
                setTimeout(() => setNotification(null), 4000);
            };

            const triggerResetAppCache = () => {
                try {
                    localStorage.clear();
                } catch(e) {}
                window.location.reload();
            };

            if (!currentUser) {
                return html`
                    <${AuthPage} 
                        users=${users} 
                        setUsers=${setUsers} 
                        onLogin=${(u) => { setCurrentUser(u); showNotification(`Selamat datang, ${u.name}!`); }} 
                        notify=${showNotification}
                        onReset=${() => setShowResetModal(true)}
                        gsheetUrl=${gsheetUrl}
                        setGsheetUrl=${setGsheetUrl}
                        onSync=${autoPullFromCloud}
                        isSyncing=${isAutoSyncing}
                    />
                `;
            }

            return html`
                <div class="min-h-screen flex flex-col md:flex-row bg-slate-50">
                    
                    <!-- Top Toast Banner -->
                    ${notification && html`
                        <div class="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 flex items-center gap-2 px-6 py-3 rounded-xl shadow-xl text-white font-semibold transition-all duration-300 ${
                            notification.type === 'success' ? 'bg-emerald-600' : 'bg-rose-600'
                        }">
                            <span>${notification.message}</span>
                        </div>
                    `}

                    <!-- CUSTOM RESET MODAL OVERLAY -->
                    ${showResetModal && html`
                        <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div class="bg-white p-6 rounded-[2rem] max-w-sm w-full shadow-2xl border text-center space-y-4">
                                <div class="w-12 h-12 bg-rose-100 text-rose-600 rounded-2xl flex items-center justify-center text-xl mx-auto"><i class="fas fa-triangle-exclamation"></i></div>
                                <h3 class="font-black text-slate-800 text-lg">Hapus Cache Sistem?</h3>
                                <p class="text-xs text-slate-500 leading-relaxed">Tindakan ini akan mengatur ulang data aplikasi ke pengaturan awal dan menghapus data simulasi di perangkat ini.</p>
                                <div class="grid grid-cols-2 gap-2 pt-2">
                                    <button onClick=${() => setShowResetModal(false)} class="p-3 bg-slate-100 text-slate-700 rounded-xl text-xs font-bold uppercase tracking-wider">Batal</button>
                                    <button onClick=${triggerResetAppCache} class="p-3 bg-rose-600 text-white rounded-xl text-xs font-bold uppercase tracking-wider">Hapus Data</button>
                                </div>
                            </div>
                        </div>
                    `}

                    <!-- SIDEBAR NAVIGATION FOR DESKTOP -->
                    <aside class="w-full md:w-64 bg-indigo-950 text-white flex-shrink-0 md:flex flex-col justify-between sticky top-0 md:h-screen z-40 p-4 shadow-xl">
                        <div>
                            <div class="flex items-center justify-between md:mb-8 pb-4 border-b border-indigo-900">
                                <div class="flex items-center gap-2">
                                    <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold"><i class="fas fa-bolt"></i></div>
                                    <h1 class="font-black text-sm tracking-tight text-indigo-100 uppercase">SalesTrack Pro</h1>
                                </div>
                                <button onClick=${() => { setCurrentUser(null); showNotification('Berhasil keluar sistem.'); }} class="md:hidden text-rose-400 p-2">
                                    <i class="fas fa-power-off text-lg"></i>
                                </button>
                            </div>

                            <div class="hidden md:flex items-center gap-3 mb-6 bg-indigo-900/40 p-3 rounded-xl border border-indigo-900/50">
                                <img src=${currentUser.avatar || "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&q=80&w=150"} class="w-10 h-10 rounded-full object-cover border-2 border-indigo-500" />
                                <div class="min-w-0 flex-1">
                                    <p class="font-bold text-xs truncate text-indigo-100">${currentUser.name}</p>
                                    <p class="text-[10px] text-indigo-400 uppercase tracking-wider font-bold">${currentUser.role === 'admin' ? '🛡️ Administrator' : '💼 Field Sales'}</p>
                                </div>
                            </div>

                            <nav class="flex md:flex-col gap-2 overflow-x-auto md:overflow-x-visible no-scrollbar py-2 md:py-0">
                                <${NavBtn} icon="fa-house" label="Dashboard" active=${activeTab === 'dashboard'} onClick=${() => setActiveTab('dashboard')} />
                                <${NavBtn} icon="fa-camera" label=${currentUser.role === 'admin' ? 'Data Absen' : 'Kamera & Absensi'} active=${activeTab === 'absensi'} onClick=${() => setActiveTab('absensi')} />
                                <${NavBtn} icon="fa-list-check" label="Manajemen Tugas" active=${activeTab === 'tugas'} onClick=${() => setActiveTab('tugas')} />
                                <${NavBtn} icon="fa-user-tie" label="Data HRIS" active=${activeTab === 'hris'} onClick=${() => setActiveTab('hris')} />
                                ${currentUser.role === 'admin' && html`
                                    <${NavBtn} icon="fa-database" label="Database & Lapor" active=${activeTab === 'database'} onClick=${() => setActiveTab('database')} />
                                `}
                            </nav>
                        </div>

                        <div class="hidden md:flex flex-col gap-2">
                            <button onClick=${() => setShowResetModal(true)} class="flex items-center gap-3 w-full p-2 text-slate-400 hover:text-white transition-all text-left text-[11px] font-bold">
                                <i class="fas fa-trash-can"></i>
                                <span>RESET DATA APLIKASI</span>
                            </button>
                            <button onClick=${() => { setCurrentUser(null); showNotification('Berhasil keluar sistem.'); }} class="flex items-center gap-3 w-full p-3 text-rose-400 hover:bg-rose-950/20 rounded-xl transition-all font-bold text-xs">
                                <i class="fas fa-power-off"></i>
                                <span>KELUAR APLIKASI</span>
                            </button>
                        </div>
                    </aside>

                    <!-- MAIN CONTENT VIEWPORT -->
                    <main class="flex-grow p-4 md:p-8 max-w-5xl mx-auto w-full pb-24 md:pb-8 overflow-y-auto">
                        ${activeTab === 'dashboard' && html`<${Dashboard} user=${currentUser} att=${attendance} tasks=${tasks} ann=${announcements} setAnn=${setAnnouncements} notify=${showNotification} />`}
                        ${activeTab === 'absensi' && html`<${Absensi} user=${currentUser} att=${attendance} setAtt=${setAttendance} notify=${showNotification} />`}
                        ${activeTab === 'tugas' && html`<${TugasPage} user=${currentUser} tasks=${tasks} setTasks=${setTasks} users=${users} notify=${showNotification} />`}
                        ${activeTab === 'hris' && html`<${HRISPage} user=${currentUser} setUser=${setCurrentUser} users=${users} setUsers=${setUsers} notify=${showNotification} />`}
                        ${activeTab === 'database' && currentUser.role === 'admin' && html`
                            <${DatabasePage} 
                                user=${currentUser} 
                                users=${users} 
                                setUsers=${setUsers}
                                att=${attendance} 
                                setAtt=${setAttendance}
                                tasks=${tasks} 
                                setTasks=${setTasks}
                                ann=${announcements} 
                                setAnn=${setAnnouncements}
                                gsheetUrl=${gsheetUrl}
                                setGsheetUrl=${setGsheetUrl}
                                notify=${showNotification} 
                            />
                        `}
                    </main>

                    <!-- STICKY BOTTOM NAVIGATION FOR MOBILE DEVICES (HP OPTIMIZED) -->
                    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-2 flex justify-around items-center md:hidden z-50 shadow-2xl rounded-t-2xl glass">
                        <${MobileNavBtn} icon="fa-house" label="Home" active=${activeTab === 'dashboard'} onClick=${() => setActiveTab('dashboard')} />
                        <${MobileNavBtn} icon="fa-camera" label="Absen" active=${activeTab === 'absensi'} onClick=${() => setActiveTab('absensi')} />
                        <${MobileNavBtn} icon="fa-list-check" label="Tugas" active=${activeTab === 'tugas'} onClick=${() => setActiveTab('tugas')} />
                        <MobileNavBtn icon="fa-user-tie" label="HRIS" active=${activeTab === 'hris'} onClick=${() => setActiveTab('hris')} />
                        ${currentUser.role === 'admin' && html`
                            <${MobileNavBtn} icon="fa-database" label="DB" active=${activeTab === 'database'} onClick=${() => setActiveTab('database')} />
                        `}
                    </nav>
                </div>
            `;
        }

        function AuthPage({ users, setUsers, onLogin, notify, onReset, gsheetUrl, setGsheetUrl, onSync, isSyncing }) {
            const [isReg, setIsReg] = useState(false);
            const [showPass, setShowPass] = useState(false);
            const [form, setForm] = useState({ name: '', email: '', pass: '', phone: '', role: 'staff', div: 'Jakarta', pos: 'Sales Representative' });

            const handleAction = async (e) => {
                e.preventDefault();
                if (isReg) {
                    if (!form.name || !form.email || !form.pass || !form.phone) {
                        return notify("Mohon lengkapi semua data pendaftaran!", "error");
                    }
                    if (users.some(u => u.email.toLowerCase() === form.email.toLowerCase())) {
                        return notify("Email tersebut sudah terdaftar!", "error");
                    }
                    const newUser = {
                        id: "U" + Date.now().toString().slice(-4),
                        email: form.email,
                        password: form.pass,
                        name: form.name,
                        role: form.role,
                        pos: form.role === 'admin' ? 'HR Manager' : form.pos,
                        div: form.div,
                        phone: form.phone,
                        avatar: "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&q=80&w=200",
                        joinDate: new Date().toLocaleDateString('id-ID')
                    };
                    setUsers([...users, newUser]);
                    notify("Pendaftaran Akun Berhasil! Silakan Login.");
                    setIsReg(false);
                } else {
                    // SEBELUM VALIDASI LOGIN: Lakukan fetch darurat dari cloud jika ada URL terpasang untuk menghindari data out-of-sync
                    if (gsheetUrl) {
                        try {
                            const res = await fetch(gsheetUrl);
                            const cloudData = await res.json();
                            if (cloudData && cloudData.users) {
                                setUsers(cloudData.users);
                                // Lakukan pencocokan ulang terhadap data ter-sinkronisasi Google Sheet
                                const foundCloud = cloudData.users.find(u => u.email.toLowerCase() === form.email.toLowerCase() && u.password === form.pass);
                                if (foundCloud) {
                                    onLogin(foundCloud);
                                    return;
                                }
                            }
                        } catch(err) {
                            console.warn("Gagal menyinkronkan sebelum login, menggunakan DB lokal", err);
                        }
                    }

                    // Validasi Database Lokal
                    const found = users.find(u => u.email.toLowerCase() === form.email.toLowerCase() && u.password === form.pass);
                    if (found) {
                        onLogin(found);
                    } else {
                        // FITUR REVISI: Tampilkan pesan eror 'salah' secara jelas pada notifikasi UI
                        notify("Email atau Password salah!", "error");
                    }
                }
            };

            return html`
                <div class="min-h-screen bg-indigo-950 flex flex-col items-center justify-center p-4">
                    <div class="w-full max-w-sm bg-white p-6 md:p-8 rounded-[2.5rem] shadow-2xl border border-white/10">
                        <div class="text-center mb-6">
                            <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white text-xl font-bold mx-auto mb-3 shadow-lg"><i class="fas fa-bolt"></i></div>
                            <h2 class="text-2xl font-black text-slate-800 tracking-tight uppercase">${isReg ? 'Daftar Baru' : 'Login Portal'}</h2>
                            <p class="text-xs text-slate-400 font-bold tracking-widest uppercase mt-1">SalesTrack Pro System</p>
                        </div>

                        <form onSubmit=${handleAction} class="space-y-4">
                            ${isReg && html`
                                <div class="space-y-4">
                                    <input placeholder="Nama Lengkap Sesuai KTP" onInput=${e => setForm({...form, name: e.target.value})} class="w-full p-3 rounded-2xl bg-slate-50 border border-slate-100 outline-none text-sm font-semibold" required />
                                    <select onInput=${e => setForm({...form, role: e.target.value})} class="w-full p-3 rounded-2xl bg-slate-50 border border-slate-100 outline-none text-sm font-bold text-indigo-900">
                                        <option value="staff">💼 Peran: Staff Sales Lapangan</option>
                                        <option value="admin">🛡️ Peran: Administrator / HRD</option>
                                    </select>
                                    ${form.role === 'staff' && html`
                                        <div class="grid grid-cols-2 gap-2">
                                            <select onInput=${e => setForm({...form, pos: e.target.value})} class="w-full p-3 rounded-xl bg-slate-50 border border-slate-100 outline-none text-xs font-semibold">
                                                <option value="Sales Representative">Sales Rep</option>
                                                <option value="Senior Sales Executive">Senior Executive</option>
                                                <option value="Canvasser">Canvasser</option>
                                            </select>
                                            <select onInput=${e => setForm({...form, div: e.target.value})} class="w-full p-3 rounded-xl bg-slate-50 border border-slate-100 outline-none text-xs font-semibold">
                                                <option value="Jakarta">DKI Jakarta</option>
                                                <option value="Jawa Barat">Jawa Barat</option>
                                                <option value="Jawa Tengah">Jawa Tengah</option>
                                                <option value="Bandung">Bandung</option>
                                            </select>
                                        </div>
                                    `}
                                    <input placeholder="Nomor WhatsApp/HP" type="tel" onInput=${e => setForm({...form, phone: e.target.value})} class="w-full p-3 rounded-2xl bg-slate-50 border border-slate-100 outline-none text-sm font-semibold" required />
                                </div>
                            `}
                            <input type="email" placeholder="Email Perusahaan" onInput=${e => setForm({...form, email: e.target.value})} class="w-full p-3 rounded-2xl bg-slate-50 border border-slate-100 outline-none text-sm font-semibold" required />
                            <div>
                                <input type=${showPass ? "text" : "password"} placeholder="Password" onInput=${e => setForm({...form, pass: e.target.value})} class="w-full p-3 rounded-2xl bg-slate-50 border border-slate-100 outline-none text-sm font-semibold" required />
                                <div class="flex items-center gap-2 mt-2 ml-2">
                                    <input type="checkbox" id="showpass" checked=${showPass} onChange=${() => setShowPass(!showPass)} class="accent-indigo-600 rounded" />
                                    <label htmlFor="showpass" class="text-[10px] font-bold text-slate-400 uppercase tracking-wider cursor-pointer select-none">Lihat Password</label>
                                </div>
                            </div>

                            <button class="w-full p-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl shadow-indigo-600/20 active:scale-95 transition-all">
                                ${isReg ? 'Kirim Pendaftaran' : 'Masuk Dashboard'}
                            </button>
                        </form>

                        <button onClick=${() => setIsReg(!isReg)} class="w-full mt-6 text-[10px] font-bold text-indigo-600 uppercase tracking-widest hover:underline text-center">
                            ${isReg ? 'Sudah Punya Akun? Login' : 'Karyawan Baru? Daftar'}
                        </button>

                        <!-- Panel Koneksi Cepat Database Awan untuk mempermudah pendaftaran awal HP -->
                        ${!isReg && html`
                            <div class="mt-6 pt-4 border-t border-slate-100 text-center space-y-2">
                                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Sambungan Cloud Google</p>
                                <div class="flex gap-1.5">
                                    <input placeholder="URL Apps Script..." value=${gsheetUrl} onInput=${e => setGsheetUrl(e.target.value)} class="flex-1 p-2 rounded-xl bg-slate-50 border text-[9px] outline-none" />
                                    <button onClick=${onSync} disabled=${isSyncing} class="p-2 bg-emerald-600 text-white rounded-xl text-[9px] font-bold uppercase">
                                        ${isSyncing ? "..." : "Sync"}
                                    </button>
                                </div>
                            </div>
                        `}
                    </div>

                    <div class="mt-6 text-center">
                        <button onClick=${onReset} class="text-[9px] text-slate-500 hover:text-white uppercase tracking-wider font-bold">
                            Reset Database Aplikasi
                        </button>
                    </div>
                </div>
            `;
        }

        function Dashboard({ user, att, tasks, ann, setAnn, notify }) {
            const [showAddAnn, setShowAddAnn] = useState(false);
            const [newAnn, setNewAnn] = useState({ title: '', content: '', attachment: null, attachmentName: '', attachmentType: '' });

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onloadend = () => {
                    setNewAnn({
                        ...newAnn,
                        attachment: reader.result,
                        attachmentName: file.name,
                        attachmentType: file.type
                    });
                    notify("Berkas media berhasil ditambahkan!");
                };
                reader.readAsDataURL(file);
            };

            const handlePostAnn = (e) => {
                e.preventDefault();
                if (!newAnn.title || !newAnn.content) return notify("Judul dan isi pengumuman wajib diisi!", "error");
                const newItem = {
                    id: "A-" + Date.now(),
                    title: newAnn.title,
                    content: newAnn.content,
                    date: new Date().toLocaleDateString('id-ID'),
                    author: user.name,
                    attachment: newAnn.attachment,
                    attachmentName: newAnn.attachmentName,
                    attachmentType: newAnn.attachmentType
                };
                setAnn([newItem, ...ann]);
                setNewAnn({ title: '', content: '', attachment: null, attachmentName: '', attachmentType: '' });
                setShowAddAnn(false);
                notify("Pengumuman berhasil disebarkan!");
            };

            const handleDeleteAnn = (id) => {
                setAnn(ann.filter(a => a.id !== id));
                notify("Pengumuman dihapus.", "error");
            };

            return html`
                <div class="space-y-6">
                    <div class="bg-indigo-900 p-6 md:p-8 rounded-[2.5rem] text-white shadow-xl relative overflow-hidden">
                        <i class="fas fa-rocket absolute -right-6 -bottom-6 text-white/10 text-9xl"></i>
                        <p class="text-[10px] font-black text-indigo-300 uppercase tracking-widest mb-1">Field Operations Portal</p>
                        <h2 class="text-2xl md:text-3xl font-black tracking-tight">Selamat Datang, ${user.name}</h2>
                        <div class="flex flex-wrap gap-2 mt-4">
                            <span class="text-[9px] bg-white/20 px-3 py-1 rounded-full font-bold uppercase tracking-wider">${user.role === 'admin' ? '🛡️ Administrator' : '💼 Sales Staff'}</span>
                            <span class="text-[9px] bg-white/20 px-3 py-1 rounded-full font-bold uppercase tracking-wider">📍 Divisi: ${user.div || 'Pusat'}</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                        <div class="bg-white p-5 rounded-[2rem] border shadow-sm flex items-center gap-4">
                            <div class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center text-lg"><i class="fas fa-list-check"></i></div>
                            <div>
                                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Tugas Anda</p>
                                <p class="text-xl font-black text-slate-800">${tasks.filter(t => user.role === 'admin' ? true : t.assignedTo === user.id).length}</p>
                            </div>
                        </div>
                        <div class="bg-white p-5 rounded-[2rem] border shadow-sm flex items-center gap-4">
                            <div class="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center text-lg"><i class="fas fa-calendar-day"></i></div>
                            <div>
                                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Hadir Hari Ini</p>
                                <p class="text-xl font-black text-slate-800">${att.filter(a => user.role === 'admin' ? true : a.userId === user.id).length}</p>
                            </div>
                        </div>
                        <div class="col-span-2 md:col-span-1 bg-white p-5 rounded-[2rem] border shadow-sm flex items-center gap-4 justify-center md:justify-start">
                            <div class="w-10 h-10 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center text-lg"><i class="fas fa-bullhorn"></i></div>
                            <div>
                                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Pengumuman</p>
                                <p class="text-xl font-black text-slate-800">${ann.length}</p>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-[2.5rem] border shadow-sm">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="font-black text-slate-800 uppercase text-xs tracking-wider">Papan Pengumuman Resmi</h3>
                            ${user.role === 'admin' && html`
                                <button onClick=${() => setShowAddAnn(!showAddAnn)} class="text-indigo-600 font-bold text-xs uppercase hover:underline">
                                    ${showAddAnn ? 'Batal' : '+ Pengumuman'}
                                </button>
                            `}
                        </div>

                        ${showAddAnn && html`
                            <form onSubmit=${handlePostAnn} class="mb-6 space-y-3 bg-slate-50 p-4 rounded-3xl border border-dashed border-indigo-200">
                                <input placeholder="Judul Pengumuman" value=${newAnn.title} onInput=${e => setNewAnn({...newAnn, title: e.target.value})} class="w-full p-3 bg-white rounded-xl text-sm font-semibold outline-none border" required />
                                <textarea placeholder="Tulis isi pengumuman kepada seluruh tim sales..." value=${newAnn.content} onInput=${e => setNewAnn({...newAnn, content: e.target.value})} class="w-full p-3 bg-white rounded-xl text-sm h-24 outline-none border resize-none" required />
                                
                                <div class="bg-white p-3 rounded-2xl border flex flex-col space-y-2">
                                    <label class="text-[10px] font-bold text-slate-400 uppercase">Tambahkan Media / Dokumen (Foto/Video/PDF)</label>
                                    <input type="file" onChange=${handleFileChange} class="text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100" />
                                    ${newAnn.attachmentName && html`
                                        <p class="text-[10px] text-emerald-600 font-bold"><i class="fas fa-paperclip mr-1"></i> Terlampir: ${newAnn.attachmentName}</p>
                                    `}
                                </div>
                                <button type="submit" class="w-full p-3 bg-indigo-600 text-white rounded-xl text-xs font-bold uppercase tracking-wider">Siarkan Pengumuman</button>
                            </form>
                        `}

                        <div class="space-y-4 max-h-[450px] overflow-y-auto no-scrollbar">
                            ${ann.length === 0 ? html`
                                <p class="text-center text-slate-400 text-xs py-6 font-semibold">Belum ada pengumuman hari ini.</p>
                            ` : ann.map(a => html`
                                <div key=${a.id} class="p-4 bg-slate-50 rounded-2xl border relative hover:border-slate-300 transition-all space-y-3">
                                    <h4 class="font-bold text-indigo-950 text-sm">${a.title}</h4>
                                    <p class="text-xs text-slate-500 leading-relaxed whitespace-pre-line">${a.content}</p>
                                    
                                    ${a.attachment && html`
                                        <div class="mt-2 border-t pt-2">
                                            ${a.attachmentType?.startsWith('image/') ? html`
                                                <img src=${a.attachment} class="max-w-full max-h-60 rounded-xl object-contain border" />
                                            ` : a.attachmentType?.startsWith('video/') ? html`
                                                <video src=${a.attachment} controls class="w-full max-h-60 rounded-xl border bg-black"></video>
                                            ` : html`
                                                <a href=${a.attachment} download=${a.attachmentName} class="inline-flex items-center gap-2 p-3 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 text-xs font-semibold rounded-xl border border-indigo-100">
                                                    <i class="fas fa-file-invoice text-lg"></i>
                                                    <div class="text-left">
                                                        <p class="font-bold text-[10px] uppercase text-indigo-400">Unduh Dokumen</p>
                                                        <p class="text-xs truncate max-w-[200px]">${a.attachmentName || 'lampiran.pdf'}</p>
                                                    </div>
                                                </a>
                                            `}
                                        </div>
                                    `}

                                    <div class="flex justify-between items-center border-t pt-2 text-[9px] font-bold text-slate-400 uppercase mt-2">
                                        <span>Oleh: ${a.author} • ${a.date}</span>
                                        ${user.role === 'admin' && html`
                                            <button onClick=${() => handleDeleteAnn(a.id)} class="text-rose-500 hover:underline">Hapus</button>
                                        `}
                                    </div>
                                </div>
                            `)}
                        </div>
                    </div>
                </div>
            `;
        }

        function Absensi({ user, att, setAtt, notify }) {
            const [notes, setNotes] = useState('');
            const [type, setType] = useState('Masuk');
            const [camActive, setCamActive] = useState(false);
            const [photo, setPhoto] = useState(null);
            const [gpsData, setGpsData] = useState(null);
            const [gpsLoading, setGpsLoading] = useState(false);

            const videoRef = useRef(null);
            const canvasRef = useRef(null);

            useEffect(() => {
                fetchLocation();
            }, []);

            const fetchLocation = () => {
                if (!navigator.geolocation) {
                    setGpsData({ lat: -6.2088, lng: 106.8456, address: "GPS tidak didukung perangkat browser." });
                    return;
                }
                setGpsLoading(true);
                try {
                    navigator.geolocation.getCurrentPosition(
                        pos => {
                            setGpsData({
                                lat: pos.coords.latitude,
                                lng: pos.coords.longitude,
                                address: `Satelit Terverifikasi (${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)})`
                            });
                            setGpsLoading(false);
                        },
                        err => {
                            setGpsData({
                                lat: -6.2088 + (Math.random() - 0.5) * 0.01,
                                lng: 106.8456 + (Math.random() - 0.5) * 0.01,
                                address: "Lokasi Simulasi GPS (Akses Satelit Ditolak)"
                            });
                            setGpsLoading(false);
                            notify("Gagal memuat GPS asli. Menggunakan koordinat simulasi.", "error");
                        }
                    );
                } catch (e) {
                    setGpsData({ lat: -6.2088, lng: 106.8456, address: "Sistem GPS Diblokir Sandbox Browser" });
                    setGpsLoading(false);
                }
            };

            useEffect(() => {
                let stream = null;
                const enableCamera = async () => {
                    if (camActive && videoRef.current) {
                        try {
                            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
                            videoRef.current.srcObject = stream;
                        } catch (e) {
                            const fallbackPhotos = [
                                "https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=300",
                                "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&q=80&w=300"
                            ];
                            setPhoto(fallbackPhotos[Math.floor(Math.random() * fallbackPhotos.length)]);
                            setCamActive(false);
                            notify("Kamera gagal diakses. Memakai foto demo otomatis.", "error");
                        }
                    }
                };
                enableCamera();
                return () => {
                    if (stream) {
                        stream.getTracks().forEach(t => t.stop());
                    }
                };
            }, [camActive]);

            const takeSelfie = () => {
                if (videoRef.current && canvasRef.current) {
                    const canvas = canvasRef.current;
                    const video = videoRef.current;
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    setPhoto(canvas.toDataURL('image/png'));
                    setCamActive(false);
                    notify("Foto berhasil diambil!");
                }
            };

            const handleSubmitAbsen = (e) => {
                e.preventDefault();
                if (!photo) return notify("Wajib melakukan foto selfie sebagai bukti kehadiran!", "error");
                if (!notes.trim()) return notify("Kolom keterangan aktivitas harian wajib diisi!", "error");
                if (!gpsData) return notify("Menunggu sistem memuat lokasi GPS...", "error");

                const newLog = {
                    id: "ATT-" + Date.now(),
                    userId: user.id,
                    userName: user.name,
                    type,
                    notes,
                    photo,
                    location: gpsData,
                    time: new Date().toLocaleDateString('id-ID') + ' ' + new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' })
                };

                setAtt([newLog, ...att]);
                setNotes('');
                setPhoto(null);
                notify(`Absen ${type} berhasil dikirim ke Admin!`);
            };

            return html`
                <div class="space-y-6">
                    ${user.role === 'admin' ? html`
                        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border">
                          <h3 class="text-xl font-bold text-slate-800 mb-2">Riwayat Presensi Tim Sales</h3>
                          <p class="text-xs text-slate-400 mb-6">Monitor presensi lapangan lengkap beserta koordinat satelit</p>

                          <div class="space-y-4 max-h-[500px] overflow-y-auto no-scrollbar">
                              ${att.length === 0 ? html`
                                  <p class="text-center text-slate-400 py-12 text-sm font-semibold">Belum ada karyawan yang absen hari ini.</p>
                              ` : att.map(a => html`
                                  <div key=${a.id} class="p-4 bg-slate-50 rounded-3xl border flex flex-col md:flex-row gap-4 items-start">
                                      <img src=${a.photo} class="w-24 h-32 rounded-2xl object-cover border shadow-sm flex-shrink-0" />
                                      <div class="space-y-1 flex-1 min-w-0">
                                          <div class="flex items-center gap-2">
                                              <h4 class="font-black text-sm text-slate-800">${a.userName}</h4>
                                              <span class="text-[9px] font-black px-2 py-0.5 rounded-full ${a.type === 'Masuk' ? 'bg-emerald-100 text-emerald-800' : 'bg-rose-100 text-rose-800'}">ABSEN ${a.type}</span>
                                          </div>
                                          <p class="text-xs font-bold text-indigo-700">⏱ ${a.time}</p>
                                          <p class="text-xs text-slate-400 font-bold truncate">
                                              📍 GPS: ${a.location?.lat ? a.location.lat.toFixed(5) : '0'}, ${a.location?.lng ? a.location.lng.toFixed(5) : '0'} (${a.location?.address || 'Lokasi simulasi'})
                                          </p>
                                          <div class="p-3 bg-white border rounded-xl text-xs text-slate-600 mt-2 italic whitespace-pre-wrap">
                                              &ldquo;${a.notes}&rdquo;
                                          </div>
                                      </div>
                                  </div>
                              `)}
                          </div>
                        </div>
                    ` : html`
                        <div class="bg-white p-6 rounded-[2.5rem] border shadow-sm max-w-xl mx-auto space-y-6">
                            <div>
                                <h3 class="text-xl font-black text-slate-800">Presensi Kehadiran Sales</h3>
                                <p class="text-xs text-slate-400 mt-1">Gunakan verifikasi kamera HP asli dan GPS presisi untuk clock-in</p>
                            </div>

                            <form onSubmit=${handleSubmitAbsen} class="space-y-4">
                                <div class="grid grid-cols-2 gap-3">
                                    <button type="button" onClick=${() => setType('Masuk')} class="p-3 rounded-2xl font-black text-xs uppercase border transition-all ${type === 'Masuk' ? 'bg-emerald-50 border-emerald-500 text-emerald-800' : 'bg-slate-50 border-slate-100 text-slate-400'}">🌅 Masuk</button>
                                    <button type="button" onClick=${() => setType('Keluar')} class="p-3 rounded-2xl font-black text-xs uppercase border transition-all ${type === 'Keluar' ? 'bg-rose-50 border-rose-500 text-rose-800' : 'bg-slate-50 border-slate-100 text-slate-400'}">🌇 Pulang</button>
                                </div>

                                <div class="bg-slate-100 p-4 rounded-2xl text-xs flex justify-between items-center border">
                                    <div class="min-w-0 flex-1">
                                        <p class="font-bold text-slate-400">Koordinat GPS Anda:</p>
                                        <p class="font-bold text-indigo-900 mt-0.5 truncate">${gpsLoading ? "Sedang melacak satelit..." : gpsData?.address}</p>
                                    </div>
                                    <button type="button" onClick=${fetchLocation} class="p-2 bg-white rounded-lg border text-indigo-600 ml-2"><i class="fas fa-arrows-rotate"></i></button>
                                </div>

                                <div class="space-y-2">
                                    <label class="block text-xs font-black text-slate-400 uppercase tracking-wider">Bukti Foto Selfie (Wajib)</label>
                                    <div class="aspect-video bg-slate-900 rounded-[2rem] overflow-hidden relative flex items-center justify-center border-4 border-slate-100 shadow-lg">
                                        ${camActive && html`<video ref=${videoRef} autoPlay playsInline class="w-full h-full object-cover" />`}
                                        ${photo && html`<img src=${photo} class="w-full h-full object-cover" />`}
                                        ${!camActive && !photo && html`
                                            <div class="text-center text-slate-500 p-4">
                                                <i class="fas fa-camera text-4xl mb-2 text-slate-700"></i>
                                                <p class="text-[10px] font-bold uppercase tracking-wider">Kamera Belum Aktif</p>
                                            </div>
                                        `}
                                        <div class="absolute bottom-4 flex gap-2 justify-center w-full">
                                            ${!camActive ? html`
                                                <button type="button" onClick=${() => setCamActive(true)} class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-xs font-bold shadow-lg">Aktifkan Kamera</button>
                                            ` : html`
                                                <button type="button" onClick=${takeSelfie} class="px-4 py-2 bg-emerald-500 hover:bg-emerald-600 text-white rounded-xl text-xs font-bold shadow-lg">Ambil Foto</button>
                                            `}
                                        </div>
                                    </div>
                                    <canvas ref=${canvasRef} class="hidden" />
                                </div>

                                <div>
                                    <label class="block text-xs font-black text-slate-400 uppercase tracking-wider mb-1">Aktivitas/Keterangan Hari Ini <span class="text-rose-500">*</span></label>
                                    <textarea placeholder="Tulis aktivitas penugasan harian yang harus dilaporkan..." value=${notes} onInput=${e => setNotes(e.target.value)} class="w-full p-4 bg-slate-50 rounded-2xl h-24 text-sm border outline-none font-semibold focus:border-indigo-500 transition-all" required />
                                </div>

                                <button type="submit" class="w-full p-3 bg-indigo-900 hover:bg-indigo-850 text-white font-black text-xs uppercase tracking-widest rounded-3xl shadow-xl">Kirim Kehadiran</button>
                            </form>
                        </div>
                    `}
                </div>
            `;
        }

        function TugasPage({ user, tasks, setTasks, users, notify }) {
            const [showAddForm, setShowAddForm] = useState(false);
            const [form, setForm] = useState({ title: '', desc: '', assignee: users.filter(u => u.role === 'staff')[0]?.id || '', deadline: '', priority: 'Sedang' });

            const handleCreateTask = (e) => {
                e.preventDefault();
                if (!form.title || !form.desc || !form.deadline) return notify("Semua kolom pembuatan tugas wajib diisi!", "error");
                
                const targetUser = users.find(u => u.id === form.assignee);
                const newTask = {
                    id: "T-" + Date.now().toString().slice(-3),
                    title: form.title,
                    description: form.desc,
                    assignedTo: form.assignee,
                    assignedName: targetUser ? targetUser.name : 'Unknown',
                    deadline: form.deadline,
                    status: 'Belum Mulai',
                    priority: form.priority
                };

                setTasks([newTask, ...tasks]);
                setForm({ title: '', desc: '', assignee: users.filter(u => u.role === 'staff')[0]?.id || '', deadline: '', priority: 'Sedang' });
                setShowAddForm(false);
                notify("Tugas baru berhasil didelegasikan!");
            };

            const handleStatusChange = (taskId, direction) => {
                const statusOrder = ['Belum Mulai', 'Sedang Dikerjakan', 'Selesai'];
                setTasks(tasks.map(t => {
                    if (t.id === taskId) {
                        const currentIndex = statusOrder.indexOf(t.status);
                        const nextIndex = currentIndex + direction;
                        if (nextIndex >= 0 && nextIndex < statusOrder.length) {
                            return { ...t, status: statusOrder[nextIndex] };
                        }
                    }
                    return t;
                }));
                notify("Status tugas diperbarui.");
            };

            const handleDeleteTask = (id) => {
                setTasks(tasks.filter(t => t.id !== id));
                notify("Tugas telah dihapus dari sistem.", "error");
            };

            return html`
                <div class="space-y-6">
                    <div class="flex justify-between items-center">
                        <div>
                            <h3 class="text-xl font-black text-slate-800">Manajemen Tugas Lapangan</h3>
                            <p class="text-xs text-slate-400">Papan pemantauan alur kerja kunjungan sales</p>
                        </div>
                        ${user.role === 'admin' && html`
                            <button onClick=${() => setShowAddForm(!showAddForm)} class="px-4 py-2 bg-indigo-600 text-white rounded-xl text-xs font-bold uppercase tracking-wider">
                                ${showAddForm ? 'Batal' : '+ Tugas Baru'}
                            </button>
                        `}
                    </div>

                    ${showAddForm && html`
                        <form onSubmit=${handleCreateTask} class="p-5 bg-white rounded-3xl border shadow-sm space-y-4 max-w-lg">
                            <h4 class="font-black text-xs uppercase tracking-wider text-slate-400">Buat Delegasi Baru</h4>
                            <input placeholder="Nama Tugas / Lokasi Kunjungan" value=${form.title} onInput=${e => setForm({...form, title: e.target.value})} class="w-full p-3 bg-slate-50 border rounded-xl text-xs font-semibold outline-none" required />
                            <textarea placeholder="Detail instruksi kerja yang harus diselesaikan..." value=${form.desc} onInput=${e => setForm({...form, desc: e.target.value})} class="w-full p-3 bg-slate-50 border rounded-xl text-xs font-semibold outline-none h-20 resize-none" required />
                            
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Tugaskan Ke</label>
                                    <select value=${form.assignee} onInput=${e => setForm({...form, assignee: e.target.value})} class="w-full p-2.5 bg-slate-50 border rounded-lg text-xs font-bold text-indigo-900 outline-none">
                                        ${users.filter(u => u.role === 'staff').map(u => html`<option key=${u.id} value=${u.id}>${u.name}</option>`)}
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Prioritas</label>
                                    <select value=${form.priority} onInput=${e => setForm({...form, priority: e.target.value})} class="w-full p-2.5 bg-slate-50 border rounded-lg text-xs font-bold text-indigo-900 outline-none">
                                        <option value="Tinggi">🔴 Tinggi</option>
                                        <option value="Sedang">🟡 Sedang</option>
                                        <option value="Rendah">🟢 Rendah</option>
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Batas Waktu (Deadline)</label>
                                <input type="date" value=${form.deadline} onInput=${e => setForm({...form, deadline: e.target.value})} class="w-full p-2.5 bg-slate-50 border rounded-lg text-xs font-semibold outline-none" required />
                            </div>
                            <button type="submit" class="w-full p-3 bg-indigo-900 text-white rounded-xl text-xs font-bold uppercase tracking-widest shadow-lg">Kirim Delegasi</button>
                        </form>
                    `}

                    <!-- KANBAN BOARD SYSTEM -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        ${['Belum Mulai', 'Sedang Dikerjakan', 'Selesai'].map(colStatus => html`
                            <div key=${colStatus} class="bg-slate-100 p-4 rounded-3xl border flex flex-col min-h-[350px]">
                                <div class="flex justify-between items-center mb-4">
                                    <span class="font-black text-xs uppercase tracking-wider text-slate-600">{colStatus}</span>
                                    <span class="bg-white/80 px-2 py-0.5 rounded-full text-[10px] font-bold border">${tasks.filter(t => (user.role === 'admin' ? true : t.assignedTo === user.id) && t.status === colStatus).length}</span>
                                </div>

                                <div class="space-y-3 flex-grow overflow-y-auto no-scrollbar">
                                    ${tasks.filter(t => (user.role === 'admin' ? true : t.assignedTo === user.id) && t.status === colStatus).map(task => html`
                                        <div key=${task.id} class="bg-white p-4 rounded-2xl border shadow-sm space-y-3 hover:border-slate-300 transition-all">
                                            <div class="flex justify-between items-start">
                                                <span class="text-[8px] font-black px-2 py-0.5 rounded-full ${task.priority === 'Tinggi' ? 'bg-rose-100 text-rose-800' : 'bg-amber-100 text-amber-800'}">${task.priority}</span>
                                                ${user.role === 'admin' && html`
                                                    <button onClick=${() => handleDeleteTask(task.id)} class="text-slate-400 hover:text-rose-600"><i class="fas fa-trash-can text-xs"></i></button>
                                                `}
                                            </div>
                                            <div>
                                                <h4 class="font-bold text-slate-800 text-xs">${task.title}</h4>
                                                <p class="text-[10px] text-slate-400 mt-1 leading-relaxed">${task.description}</p>
                                            </div>
                                            <div class="border-t pt-2 text-[9px] font-bold text-slate-400 uppercase space-y-1">
                                                <p>👤 PIC: <span class="text-indigo-900">${task.assignedName}</span></p>
                                                <p>⏱ Batas: ${task.deadline}</p>
                                            </div>

                                            <div class="flex gap-1 pt-1">
                                                ${colStatus !== 'Belum Mulai' && html`

        function DatabasePage({ users, setUsers, att, setAtt, tasks, setTasks, ann, setAnn, gsheetUrl, setGsheetUrl, notify }) {
            const [searchTerm, setSearchTerm] = useState('');
            const [filterTab, setFilterTab] = useState('all');
            const [syncLoading, setSyncLoading] = useState(false);
            const [showAppsScriptGuide, setShowAppsScriptGuide] = useState(false);

            const handleExportData = () => {
                const csvRows = [];
                csvRows.push("Kategori,ID,Detail Utama,Detail Tambahan,Tanggal/Waktu");
                
                users.forEach(u => csvRows.push(`Karyawan,${u.id},${u.name},${u.email} - ${u.pos},${u.joinDate}`));
                att.forEach(a => csvRows.push(`Presensi,${a.id},${a.userName},${a.type} - ${a.notes.replace(/,/g, '')},${a.time}`));
                tasks.forEach(t => csvRows.push(`Tugas,${t.id},${t.title},PIC: ${t.assignedName} - Status: ${t.status},Deadline: ${t.deadline}`));
                ann.forEach(a => csvRows.push(`Pengumuman,${a.id},${a.title},Oleh: ${a.author},${a.date}`));

                const csvContent = "data:text/csv;charset=utf-8," + csvRows.join("\n");
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `Laporan_SalesTrack_Keseluruhan_${new Date().toISOString().slice(0,10)}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                notify("Ekspor CSV Laporan Berhasil!");
            };

            const handlePushToSheet = async () => {
                if (!gsheetUrl) return notify("Harap masukkan URL Google Apps Script Web App!", "error");
                setSyncLoading(true);
                try {
                    const payload = { users, attendance: att, tasks, announcements: ann };
                    await fetch(gsheetUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'push', payload })
                    });
                    notify("Penyelarasan (Push) berhasil dikirim ke Google Sheet!");
                } catch (e) {
                    notify("Penyelarasan gagal: " + e.message, "error");
                } finally {
                    setSyncLoading(false);
                }
            };

            const handlePullFromSheet = async () => {
                if (!gsheetUrl) return notify("Harap masukkan URL Google Apps Script Web App!", "error");
                setSyncLoading(true);
                try {
                    const response = await fetch(gsheetUrl);
                    const data = await response.json();
                    if (data && data.users && data.tasks) {
                        setUsers(data.users);
                        setAtt(data.attendance || []);
                        setTasks(data.tasks);
                        setAnn(data.announcements || []);
                        notify("Database lokal berhasil ditarik (Pull) dari Google Sheet!");
                    } else {
                        notify("Gagal memparsing database Google Sheet, pastikan struktur Apps Script benar.", "error");
                    }

                    notify("Penarikan gagal: " + e.message, "error");

                                <p class="text-xs text-emerald-100/90 leading-relaxed max-w-xl">Pindahkan dan sinkronkan database absensi, status tugas, dan direktori HRIS secara otomatis menggunakan Google Apps Script.</p>
                            </div>

                            </button>
                        </div>

                        ${showAppsScriptGuide && html`

                                <ol class="list-decimal list-inside space-y-2 text-emerald-100">

                                    <li>Klik <strong class="text-white">Extensions -> Apps Script</strong>.</li>

                                <pre class="bg-slate-900/80 p-3 rounded-xl overflow-x-auto text-[10px] font-mono text-emerald-400 max-h-48 no-scrollbar">
function doGet(e) {
  var prop = PropertiesService.getScriptProperties();
  var db = prop.getProperty('sales_db_backup');
  return ContentService.createTextOutput(db || "{}").setMimeType(ContentService.MimeType.JSON);
}

function doPost(e) {
  var data = JSON.parse(e.postData.contents);
  var prop = PropertiesService.getScriptProperties();
  if (data.action === 'push') {
    prop.setProperty('sales_db_backup', JSON.stringify(data.payload));
    
    // Tulis visual ke baris sheet
    var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
    sheet.clear();
    sheet.appendRow(["DATA PENJUALAN LAPANGAN", "TERSYNCHRONIZED ON: " + new Date()]);
    sheet.appendRow(["Kategori", "ID", "Nama/Detail", "Email/Notes"]);
    data.payload.users.forEach(function(u) {
      sheet.appendRow(["Karyawan", u.id, u.name, u.email]);
    });
    data.payload.attendance.forEach(function(a) {
      sheet.appendRow(["Presensi", a.id, a.userName, a.type + " - " + a.notes]);
    });
    return ContentService.createTextOutput(JSON.stringify({status:"ok"}));
  }
}</pre>

                        <div class="bg-white p-5 rounded-[2rem] border shadow-sm space-y-3">
                            <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Statistik Kehadiran Bulanan</h4>
                            <div class="flex items-end gap-2 h-32 pt-4">
                                <div class="flex-1 bg-indigo-200 h-[40%] rounded-t-lg relative group"><span class="absolute bottom-full left-1/2 -translate-x-1/2 text-[9px] font-bold text-slate-500 opacity-0 group-hover:opacity-100 transition-all">40%</span></div>
                                <div class="flex-1 bg-indigo-200 h-[60%] rounded-t-lg relative group"><span class="absolute bottom-full left-1/2 -translate-x-1/2 text-[9px] font-bold text-slate-500 opacity-0 group-hover:opacity-100 transition-all">60%</span></div>
                                <div class="flex-1 bg-indigo-200 h-[50%] rounded-t-lg relative group"><span class="absolute bottom-full left-1/2 -translate-x-1/2 text-[9px] font-bold text-slate-500 opacity-0 group-hover:opacity-100 transition-all">50%</span></div>
                                <div class="flex-1 bg-indigo-600 h-[95%] rounded-t-lg relative group"><span class="absolute bottom-full left-1/2 -translate-x-1/2 text-[9px] font-bold text-indigo-700 opacity-100">95%</span></div>
                            </div>
                            <div class="flex justify-between text-[9px] font-bold text-slate-400 uppercase border-t pt-2">
                                <span>M1</span>
                                <span>M2</span>
                                <span>M3</span>
                                <span class="text-indigo-600 font-extrabold">Hari Ini</span>
                            </div>
                        </div>

                        <div class="bg-white p-5 rounded-[2rem] border shadow-sm space-y-3">
                            <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Analisis KPI Tim Sales</h4>
                            <div class="space-y-2 text-xs">
                                <div class="flex justify-between">
                                    <span class="font-bold text-slate-600">Kehadiran Harian</span>
                                    <span class="font-extrabold text-indigo-900">${att.length} Absensi</span>
                                </div>
                                <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                    <div class="bg-emerald-500 h-full" style="width: 85%"></div>
                                </div>
                                <div class="flex justify-between mt-2">
                                    <span class="font-bold text-slate-600">Tugas Diselesaikan</span>
                                    <span class="font-extrabold text-indigo-900">${tasks.filter(t => t.status === 'Selesai').length} / ${tasks.length} Tugas</span>
                                </div>
                                <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                    <div class="bg-indigo-600 h-full" style="width: ${tasks.length ? (tasks.filter(t => t.status === 'Selesai').length / tasks.length) * 100 : 0}%"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- PENELUSURAN DATA TIM -->
                    <div class="bg-white p-6 rounded-[2.5rem] border shadow-sm space-y-4">
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                            <div class="relative flex-1 max-w-sm">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400"><i class="fas fa-search text-xs"></i></span>
                                <input type="text" placeholder="Cari nama, tugas, atau presensi..." value=${searchTerm} onInput=${e => setSearchTerm(e.target.value)} class="w-full pl-9 pr-4 py-2.5 bg-slate-50 border rounded-2xl outline-none text-xs font-semibold focus:border-indigo-500 transition-all" />
                            </div>
                            <div class="flex gap-1.5 overflow-x-auto no-scrollbar">
                                <button onClick=${() => setFilterTab('all')} class="px-3 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-wider border ${filterTab === 'all' ? 'bg-indigo-950 text-white border-indigo-950' : 'bg-slate-50 text-slate-400'}">Semua</button>
                                <button onClick=${() => setFilterTab('att')} class="px-3 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-wider border ${filterTab === 'att' ? 'bg-indigo-950 text-white border-indigo-950' : 'bg-slate-50 text-slate-400'}">Presensi</button>
                                <button onClick=${() => setFilterTab('tasks')} class="px-3 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-wider border ${filterTab === 'tasks' ? 'bg-indigo-950 text-white border-indigo-950' : 'bg-slate-50 text-slate-400'}">Tugas</button>
                            </div>
                        </div>

                        <!-- TABEL DATA LENGKAP -->
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-xs">
                                <thead>
                                    <tr class="bg-slate-50 border-b text-slate-400 uppercase tracking-widest text-[9px] font-bold">
                                        <th class="p-3">Kategori</th>
                                        <th class="p-3">Detail Utama</th>
                                        <th class="p-3">Keterangan</th>
                                        <th class="p-3">Waktu/Batas</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y font-semibold text-slate-600">
                                    ${(filterTab === 'all' || filterTab === 'att') && att
                                        .filter(a => a.userName.toLowerCase().includes(searchTerm.toLowerCase()) || a.notes.toLowerCase().includes(searchTerm.toLowerCase()))
                                        .map(a => html`
                                        <tr class="hover:bg-slate-50/40">
                                            <td class="p-3"><span class="px-2 py-0.5 bg-emerald-100 text-emerald-800 rounded-full text-[8px] uppercase font-bold">Presensi</span></td>
                                            <td class="p-3 font-bold text-slate-800">${a.userName}</td>
                                            <td class="p-3 truncate max-w-[150px]">${a.type} - ${a.notes}</td>
                                            <td class="p-3 text-indigo-700 font-bold">${a.time}</td>
                                        </tr>
                                    `)}
                                    ${(filterTab === 'all' || filterTab === 'tasks') && tasks
                                        .filter(t => t.title.toLowerCase().includes(searchTerm.toLowerCase()) || t.assignedName.toLowerCase().includes(searchTerm.toLowerCase()))
                                        .map(t => html`
                                        <tr class="hover:bg-slate-50/40">
                                            <td class="p-3"><span class="px-2 py-0.5 bg-indigo-100 text-indigo-800 rounded-full text-[8px] uppercase font-bold">Tugas</span></td>
                                            <td class="p-3 font-bold text-slate-800">${t.title}</td>
                                            <td class="p-3">PIC: ${t.assignedName} (${t.status})</td>
                                            <td class="p-3 text-rose-600 font-bold">${t.deadline}</td>
                                        </tr>
                                    `)}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        function NavBtn({ icon, label, active, onClick }) {
            return html`
                <button onClick=${onClick} class="flex items-center gap-3 w-full p-3 rounded-xl transition-all font-bold text-xs ${active ? 'bg-indigo-900 text-indigo-200' : 'text-indigo-400 hover:bg-indigo-900/30'}">
                    <i class="fas ${icon} text-sm"></i>
                    <span>${label}</span>
                </button>
            `;
        }

        function MobileNavBtn({ icon, label, active, onClick }) {
            return html`
                <button onClick=${onClick} class="flex flex-col items-center justify-center p-2 rounded-xl flex-1 transition-all ${active ? 'text-indigo-600' : 'text-slate-400'}">
                    <i class="fas ${icon} text-base"></i>
                    <span class="text-[9px] font-black uppercase mt-1 tracking-tighter">${label}</span>
                </button>
            `;
        }

        preact.render(html`<${App} />`, document.getElementById('root'));
    </script>
</body>
</html>
