<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SalesTrack Pro v2.2 | Portal Lapangan Premium</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Font Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }
        .glass { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px); 
        }
        .no-scrollbar::-webkit-scrollbar { 
            display: none; 
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <!-- Memuat Preact, Hooks, dan HTM melalui UMD Global -->
    <script src="https://unpkg.com/preact@10.19.3/dist/preact.min.js"></script>
    <script src="https://unpkg.com/preact@10.19.3/hooks/dist/hooks.umd.js"></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>

    <script>
        const { useState, useEffect, useRef } = window.preactHooks;
        const html = window.htm.bind(window.preact.h);

        // Data Cadangan Awal jika Cloud Belum Terkoneksi
        const INITIAL_USERS = [
            { 
                id: "U001", 
                email: "admin@sales.com", 
                password: "admin123", 
                name: "Hendra Manager", 
                role: "admin", 
                pos: "Sales Manager", 
                div: "Pusat", 
                phone: "08123456789", 
                avatar: "https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&q=80&w=200",
                joinDate: "15/01/2024"
            },
            { 
                id: "U002", 
                email: "sales@sales.com", 
                password: "sales123", 
                name: "Budi Sales", 
                role: "staff", 
                pos: "Field Sales", 
                div: "Jakarta", 
                phone: "08778899001", 
                avatar: "https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?auto=format&fit=crop&q=80&w=200",
                joinDate: "10/02/2024"
            }
        ];

        const INITIAL_TASKS = [
            { 
                id: "T-01", 
                title: "Kunjungan Toko Berkah Jaya", 
                description: "Lakukan pengecekan stok produk dan tawarkan promo potongan harga kuartal ini.", 
                assignedTo: "U002", 
                assignedName: "Budi Sales", 
                deadline: "2026-06-25", 
                status: "Belum Mulai", 
                priority: "Tinggi" 
            }
        ];

        const INITIAL_ANNOUNCEMENTS = [
            { 
                id: "A-01", 
                title: "Target Operasional Juni", 
                content: "Fokus peningkatan penetrasi produk baru ke sektor ritel tradisional wilayah Jakarta.", 
                date: "18/06/2026", 
                author: "Hendra Manager",
                attachment: null,
                attachmentName: "",
                attachmentType: ""
            }
        ];

        // Penanganan Error Penyimpanan Lokal Sandbox
        const safeGetItem = (key, fallback) => {
            try {
                const value = localStorage.getItem(key);
                return value ? JSON.parse(value) : fallback;
            } catch (e) {
                console.warn("Akses penyimpanan lokal dibatasi. Menggunakan buffer memori.", e);
                return fallback;
            }
        };

        const safeSetItem = (key, value) => {
            try {
                localStorage.setItem(key, JSON.stringify(value));
            } catch (e) {
                // Diabaikan secara aman jika terisolasi sandbox
            }
        };

        function App() {
            const [users, setUsers] = useState(() => safeGetItem('st_users_v2.2', INITIAL_USERS));
            const [currentUser, setCurrentUser] = useState(() => safeGetItem('st_curr_v2.2', null));
            const [attendance, setAttendance] = useState(() => safeGetItem('st_att_v2.2', []));
            const [tasks, setTasks] = useState(() => safeGetItem('st_tasks_v2.2', INITIAL_TASKS));
            const [announcements, setAnnouncements] = useState(() => safeGetItem('st_ann_v2.2', INITIAL_ANNOUNCEMENTS));
            const [gsheetUrl, setGsheetUrl] = useState(() => safeGetItem('st_gsheet_url_v2.2', ''));

            // UI States
            const [activeTab, setActiveTab] = useState('dashboard');
            const [notification, setNotification] = useState(null);
            const [showResetModal, setShowResetModal] = useState(false);
            const [isAutoSyncing, setIsAutoSyncing] = useState(false);

            // Penyinkronan otomatis data state ke memori penyimpanan lokal HP
            useEffect(() => {
                safeSetItem('st_users_v2.2', users);
                safeSetItem('st_curr_v2.2', currentUser);
                safeSetItem('st_att_v2.2', attendance);
                safeSetItem('st_tasks_v2.2', tasks);
                safeSetItem('st_ann_v2.2', announcements);
                safeSetItem('st_gsheet_url_v2.2', gsheetUrl);
            }, [users, currentUser, attendance, tasks, announcements, gsheetUrl]);

            // Siklus penarikan otomatis background polling setiap 12 detik jika URL tersedia
            useEffect(() => {
                if (gsheetUrl) {
                    autoPullFromCloud();
                    const interval = setInterval(() => {
                        autoPullFromCloud();
                    }, 12000);
                    return () => clearInterval(interval);
                }
            }, [gsheetUrl]);

            // Pengiriman instan asinkron tanpa memblokir interaksi pengguna di HP
            const autoPushToCloud = async (latestUsers = users, latestAtt = attendance, latestTasks = tasks, latestAnn = announcements) => {
                if (!gsheetUrl) return;
                try {
                    const payload = { users: latestUsers, attendance: latestAtt, tasks: latestTasks, announcements: latestAnn };
                    await fetch(gsheetUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'push', payload })
                    });
                    console.log("Sinkronisasi otomatis ke awan berhasil diselaraskan.");
                } catch (e) {
                    console.warn("Gagal menyinkronkan data otomatis ke awan:", e);
                }
            };

            const autoPullFromCloud = async () => {
                setIsAutoSyncing(true);
                try {
                    const response = await fetch(gsheetUrl);
                    const data = await response.json();
                    if (data && data.users && data.tasks) {
                        setUsers(data.users);
                        setAttendance(data.attendance || []);
                        setTasks(data.tasks);
                        setAnnouncements(data.announcements || []);
                        
                        // Perbarui data user saat ini jika ada perubahan biodata dari pusat
                        if (currentUser) {
                            const updatedMe = data.users.find(u => u.id === currentUser.id);
                            if (updatedMe) setCurrentUser(updatedMe);
                        }
                        console.log("Database awan berhasil diperbarui secara otomatis!");
                    }
                } catch (e) {
                    console.warn("Auto-Pull ditangguhkan: Menunggu jaringan stabil atau otorisasi.", e);
                } finally {
                    setIsAutoSyncing(false);
                }
            };

            // Wrapper pengubah state yang menginisiasi pengiriman asinkron otomatis ke awan
            const saveAndSyncUsers = (newUsers) => {
                setUsers(newUsers);
                autoPushToCloud(newUsers, attendance, tasks, announcements);
            };

            const saveAndSyncAttendance = (newAtt) => {
                setAttendance(newAtt);
                autoPushToCloud(users, newAtt, tasks, announcements);
            };

            const saveAndSyncTasks = (newTasks) => {
                setTasks(newTasks);
                autoPushToCloud(users, attendance, newTasks, announcements);
            };

            const saveAndSyncAnnouncements = (newAnn) => {
                setAnnouncements(newAnn);
                autoPushToCloud(users, attendance, tasks, newAnn);
            };

            const showNotification = (message, type = 'success') => {
                setNotification({ message, type });
                setTimeout(() => setNotification(null), 4000);
            };

            const triggerResetAppCache = () => {
                try {
                    localStorage.clear();
                } catch(e) {}
                window.location.reload();
            };

            // Render Aplikasi Global yang menyertakan Toast Notifikasi untuk AuthPage maupun Dashboard
            return html`
                <div class="relative min-h-screen bg-slate-50">
                    
                    <!-- Top Toast Banner (Global untuk login maupun dashboard) -->
                    ${notification && html`
                        <div class="fixed top-4 left-1/2 transform -translate-x-1/2 z-[9999] flex items-center gap-2 px-6 py-3 rounded-xl shadow-xl text-white font-semibold transition-all duration-300 ${
                            notification.type === 'success' ? 'bg-emerald-600' : 'bg-rose-600'
                        }">
                            <span>${notification.message}</span>
                        </div>
                    `}

                    ${!currentUser ? html`
                        <${AuthPage} 
                            users=${users} 
                            setUsers=${saveAndSyncUsers} 
                            onLogin=${(u) => { setCurrentUser(u); showNotification(`Selamat datang, ${u.name}!`); }} 
                            notify=${showNotification}
                            onReset=${() => setShowResetModal(true)}
                            gsheetUrl=${gsheetUrl}
                            setGsheetUrl=${setGsheetUrl}
                            onSync=${autoPullFromCloud}
                            isSyncing=${isAutoSyncing}
                        />
                    ` : html`
                        <div class="min-h-screen flex flex-col md:flex-row bg-slate-50">
                            
                            <!-- CUSTOM RESET MODAL OVERLAY -->
                            ${showResetModal && html`
                                <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                                    <div class="bg-white p-6 rounded-[2rem] max-w-sm w-full shadow-2xl border text-center space-y-4">
                                        <div class="w-12 h-12 bg-rose-100 text-rose-600 rounded-2xl flex items-center justify-center text-xl mx-auto"><i class="fas fa-triangle-exclamation"></i></div>
                                        <h3 class="font-black text-slate-800 text-lg">Hapus Cache Sistem?</h3>
                                        <p class="text-xs text-slate-500 leading-relaxed">Tindakan ini akan mengatur ulang data aplikasi ke pengaturan awal dan menghapus data simulasi di perangkat ini.</p>
                                        <div class="grid grid-cols-2 gap-2 pt-2">
                                            <button onClick=${() => setShowResetModal(false)} class="p-3 bg-slate-100 text-slate-700 rounded-xl text-xs font-bold uppercase tracking-wider">Batal</button>
                                            <button onClick=${triggerResetAppCache} class="p-3 bg-rose-600 text-white rounded-xl text-xs font-bold uppercase tracking-wider">Hapus Data</button>
                                        </div>
                                    </div>
                                </div>
                            `}

                            <!-- SIDEBAR NAVIGATION FOR DESKTOP -->
                            <aside class="w-full md:w-64 bg-indigo-950 text-white flex-shrink-0 md:flex flex-col justify-between sticky top-0 md:h-screen z-40 p-4 shadow-xl">
                                <div>
                                    <div class="flex items-center justify-between md:mb-8 pb-4 border-b border-indigo-900">
                                        <div class="flex items-center gap-2">
                                            <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold"><i class="fas fa-bolt"></i></div>
                                            <h1 class="font-black text-sm tracking-tight text-indigo-100 uppercase">SalesTrack Pro</h1>
                                        </div>
                                        <button onClick=${() => { setCurrentUser(null); showNotification('Berhasil keluar sistem.'); }} class="md:hidden text-rose-400 p-2">
                                            <i class="fas fa-power-off text-lg"></i>
                                        </button>
                                    </div>

                                    <div class="hidden md:flex items-center gap-3 mb-6 bg-indigo-900/40 p-3 rounded-xl border border-indigo-900/50">
                                        <img src=${currentUser.avatar || "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&q=80&w=150"} class="w-10 h-10 rounded-full object-cover border-2 border-indigo-500" />
                                        <div class="min-w-0 flex-1">
                                            <p class="font-bold text-xs truncate text-indigo-100">${currentUser.name}</p>
                                            <p class="text-[10px] text-indigo-400 uppercase tracking-wider font-bold">${currentUser.role === 'admin' ? '🛡️ Administrator' : '💼 Field Sales'}</p>
                                        </div>
                                    </div>

                                    <nav class="flex md:flex-col gap-2 overflow-x-auto md:overflow-x-visible no-scrollbar py-2 md:py-0">
                                        <${NavBtn} icon="fa-house" label="Dashboard" active=${activeTab === 'dashboard'} onClick=${() => setActiveTab('dashboard')} />
                                        <${NavBtn} icon="fa-camera" label=${currentUser.role === 'admin' ? 'Data Absen' : 'Kamera & Absensi'} active=${activeTab === 'absensi'} onClick=${() => setActiveTab('absensi')} />
                                        <${NavBtn} icon="fa-list-check" label="Manajemen Tugas" active=${activeTab === 'tugas'} onClick=${() => setActiveTab('tugas')} />
                                        <${NavBtn} icon="fa-user-tie" label="Data HRIS" active=${activeTab === 'hris'} onClick=${() => setActiveTab('hris')} />
                                        ${currentUser.role === 'admin' && html`
                                            <${NavBtn} icon="fa-database" label="Database & Lapor" active=${activeTab === 'database'} onClick=${() => setActiveTab('database')} />
                                        `}
                                    </nav>
                                </div>

                                <div class="hidden md:flex flex-col gap-2">
                                    <button onClick=${() => setShowResetModal(true)} class="flex items-center gap-3 w-full p-2 text-slate-400 hover:text-white transition-all text-left text-[11px] font-bold">
                                        <i class="fas fa-trash-can"></i>
                                        <span>RESET DATA APLIKASI</span>
                                    </button>
                                    <button onClick=${() => { setCurrentUser(null); showNotification('Berhasil keluar sistem.'); }} class="flex items-center gap-3 w-full p-3 text-rose-400 hover:bg-rose-950/20 rounded-xl transition-all font-bold text-xs">
                                        <i class="fas fa-power-off"></i>
                                        <span>KELUAR APLIKASI</span>
                                    </button>
                                </div>
                            </aside>

                            <!-- MAIN CONTENT VIEWPORT -->
                            <main class="flex-grow p-4 md:p-8 max-w-5xl mx-auto w-full pb-24 md:pb-8 overflow-y-auto">
                                ${activeTab === 'dashboard' && html`<${Dashboard} user=${currentUser} att=${attendance} tasks=${tasks} ann=${announcements} setAnn=${saveAndSyncAnnouncements} notify=${showNotification} />`}
                                ${activeTab === 'absensi' && html`<${Absensi} user=${currentUser} att=${attendance} setAtt=${saveAndSyncAttendance} notify=${showNotification} />`}
                                ${activeTab === 'tugas' && html`<${TugasPage} user=${currentUser} tasks=${tasks} setTasks=${saveAndSyncTasks} users=${users} notify=${showNotification} />`}
                                ${activeTab === 'hris' && html`<${HRISPage} user=${currentUser} setUser=${setCurrentUser} users=${users} setUsers=${saveAndSyncUsers} notify=${showNotification} />`}
                                ${activeTab === 'database' && currentUser.role === 'admin' && html`
                                    <${DatabasePage} 
                                        user=${currentUser} 
                                        users=${users} 
                                        setUsers=${saveAndSyncUsers}
                                        att=${attendance} 
                                        setAtt=${saveAndSyncAttendance}
                                        tasks=${tasks} 
                                        setTasks=${saveAndSyncTasks}
                                        ann=${announcements} 
                                        setAnn=${saveAndSyncAnnouncements}
                                        gsheetUrl=${gsheetUrl}
                                        setGsheetUrl=${setGsheetUrl}
                                        notify=${showNotification} 
                                    />
                                `}
                            </main>

                            <!-- STICKY BOTTOM NAVIGATION FOR MOBILE DEVICES (HP OPTIMIZED) -->
                            <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-2 flex justify-around items-center md:hidden z-50 shadow-2xl rounded-t-2xl glass">
                                <${MobileNavBtn} icon="fa-house" label="Home" active=${activeTab === 'dashboard'} onClick=${() => setActiveTab('dashboard')} />
                                <${MobileNavBtn} icon="fa-camera" label="Absen" active=${activeTab === 'absensi'} onClick=${() => setActiveTab('absensi')} />
                                <${MobileNavBtn} icon="fa-list-check" label="Tugas" active=${activeTab === 'tugas'} onClick=${() => setActiveTab('tugas')} />
                                <MobileNavBtn icon="fa-user-tie" label="HRIS" active=${activeTab === 'hris'} onClick=${() => setActiveTab('hris')} />
                                ${currentUser.role === 'admin' && html`
                                    <${MobileNavBtn} icon="fa-database" label="DB" active=${activeTab === 'database'} onClick=${() => setActiveTab('database')} />
                                `}
                            </nav>
                        </div>
                    `}
                </div>
            `;
        }

        function TugasPage({ user, tasks, setTasks, users, notify }) {
            const [showAddForm, setShowAddForm] = useState(false);
            const [form, setForm] = useState({ title: '', desc: '', assignee: users.filter(u => u.role === 'staff')[0]?.id || '', deadline: '', priority: 'Sedang' });

            const handleCreateTask = (e) => {
                e.preventDefault();
                if (!form.title || !form.desc || !form.deadline) return notify("Semua kolom pembuatan tugas wajib diisi!", "error");
                
                const targetUser = users.find(u => u.id === form.assignee);
                const newTask = {
                    id: "T-" + Date.now().toString().slice(-3),
                    title: form.title,
                    description: form.desc,
                    assignedTo: form.assignee,
                    assignedName: targetUser ? targetUser.name : 'Unknown',
                    deadline: form.deadline,
                    status: 'Belum Mulai',
                    priority: form.priority
                };

                setTasks([newTask, ...tasks]);
                setForm({ title: '', desc: '', assignee: users.filter(u => u.role === 'staff')[0]?.id || '', deadline: '', priority: 'Sedang' });
                setShowAddForm(false);
                notify("Tugas baru berhasil didelegasikan!");
            };

            const handleStatusChange = (taskId, direction) => {
                const statusOrder = ['Belum Mulai', 'Sedang Dikerjakan', 'Selesai'];
                setTasks(tasks.map(t => {
                    if (t.id === taskId) {
                        const currentIndex = statusOrder.indexOf(t.status);
                        const nextIndex = currentIndex + direction;
                        if (nextIndex >= 0 && nextIndex < statusOrder.length) {
                            return { ...t, status: statusOrder[nextIndex] };
                        }
                    }
                    return t;
                }));
                notify("Status tugas diperbarui.");
            };

            const handleDeleteTask = (id) => {
                setTasks(tasks.filter(t => t.id !== id));
                notify("Tugas telah dihapus dari sistem.", "error");
            };

            return html`
                <div class="space-y-6">
                    <div class="flex justify-between items-center">
                        <div>
                            <h3 class="text-xl font-black text-slate-800">Manajemen Tugas Lapangan</h3>
                            <p class="text-xs text-slate-400">Papan pemantauan alur kerja kunjungan sales</p>
                        </div>
                        ${user.role === 'admin' && html`
                            <button onClick=${() => setShowAddForm(!showAddForm)} class="px-4 py-2 bg-indigo-600 text-white rounded-xl text-xs font-bold uppercase tracking-wider">
                                ${showAddForm ? 'Batal' : '+ Tugas Baru'}
                            </button>
                        `}
                    </div>

                    ${showAddForm && html`
                        <form onSubmit=${handleCreateTask} class="p-5 bg-white rounded-3xl border shadow-sm space-y-4 max-w-lg">
                            <h4 class="font-black text-xs uppercase tracking-wider text-slate-400">Buat Delegasi Baru</h4>
                            <input placeholder="Nama Tugas / Lokasi Kunjungan" value=${form.title} onInput=${e => setForm({...form, title: e.target.value})} class="w-full p-3 bg-slate-50 border rounded-xl text-xs font-semibold outline-none" required />
                            <textarea placeholder="Detail instruksi kerja yang harus diselesaikan..." value=${form.desc} onInput=${e => setForm({...form, desc: e.target.value})} class="w-full p-3 bg-slate-50 border rounded-xl text-xs font-semibold outline-none h-20 resize-none" required />
                            
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Tugaskan Ke</label>
                                    <select value=${form.assignee} onInput=${e => setForm({...form, assignee: e.target.value})} class="w-full p-2.5 bg-slate-50 border rounded-lg text-xs font-bold text-indigo-900 outline-none">
                                        ${users.filter(u => u.role === 'staff').map(u => html`<option key=${u.id} value=${u.id}>${u.name}</option>`)}
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Prioritas</label>
                                    <select value=${form.priority} onInput=${e => setForm({...form, priority: e.target.value})} class="w-full p-2.5 bg-slate-50 border rounded-lg text-xs font-bold text-indigo-900 outline-none">
                                        <option value="Tinggi">🔴 Tinggi</option>
                                        <option value="Sedang">🟡 Sedang</option>
                                        <option value="Rendah">🟢 Rendah</option>
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Batas Waktu (Deadline)</label>
                                <input type="date" value=${form.deadline} onInput=${e => setForm({...form, deadline: e.target.value})} class="w-full p-2.5 bg-slate-50 border rounded-lg text-xs font-semibold outline-none" required />
                            </div>
                            <button type="submit" class="w-full p-3 bg-indigo-900 text-white rounded-xl text-xs font-bold uppercase tracking-widest shadow-lg">Kirim Delegasi</button>
                        </form>
                    `}

                    <!-- KANBAN BOARD SYSTEM -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        ${['Belum Mulai', 'Sedang Dikerjakan', 'Selesai'].map(colStatus => html`
                            <div key=${colStatus} class="bg-slate-100 p-4 rounded-3xl border flex flex-col min-h-[350px]">
                                <div class="flex justify-between items-center mb-4">
                                    <span class="font-black text-xs uppercase tracking-wider text-slate-600">{colStatus}</span>
                                    <span class="bg-white/80 px-2 py-0.5 rounded-full text-[10px] font-bold border">${tasks.filter(t => (user.role === 'admin' ? true : t.assignedTo === user.id) && t.status === colStatus).length}</span>
                                </div>

                                <div class="space-y-3 flex-grow overflow-y-auto no-scrollbar">
                                    ${tasks.filter(t => (user.role === 'admin' ? true : t.assignedTo === user.id) && t.status === colStatus).map(task => html`
                                        <div key=${task.id} class="bg-white p-4 rounded-2xl border shadow-sm space-y-3 hover:border-slate-300 transition-all">
                                            <div class="flex justify-between items-start">
                                                <span class="text-[8px] font-black px-2 py-0.5 rounded-full ${task.priority === 'Tinggi' ? 'bg-rose-100 text-rose-800' : 'bg-amber-100 text-amber-800'}">${task.priority}</span>
                                                ${user.role === 'admin' && html`
                                                    <button onClick=${() => handleDeleteTask(task.id)} class="text-slate-400 hover:text-rose-600"><i class="fas fa-trash-can text-xs"></i></button>
                                                `}
                                            </div>
                                            <div>
                                                <h4 class="font-bold text-slate-800 text-xs">${task.title}</h4>
                                                <p class="text-[10px] text-slate-400 mt-1 leading-relaxed">${task.description}</p>
                                            </div>
                                            <div class="border-t pt-2 text-[9px] font-bold text-slate-400 uppercase space-y-1">
                                                <p>👤 PIC: <span class="text-indigo-900">${task.assignedName}</span></p>
                                                <p>⏱ Batas: ${task.deadline}</p>
                                            </div>

                                            <div class="flex gap-1 pt-1">
                                                ${colStatus !== 'Belum Mulai' && html`
                                                    <button onClick=${() => handleStatusChange(task.id, -1)} class="flex-1 p-1 bg-slate-100 text-[9px] font-bold uppercase rounded-lg hover:bg-slate-200">Mundur</button>
                                                `}
                                                ${colStatus !== 'Selesai' && html`
                                                    <button onClick=${() => handleStatusChange(task.id, 1)} class="flex-1 p-1 bg-indigo-900 text-white text-[9px] font-bold uppercase rounded-lg hover:bg-indigo-850">Lanjut</button>
                                                `}
                                            </div>
                                        </div>
                                    `)}
                                </div>
                            </div>
                        `)}

                users.forEach(u => csvRows.push(`Karyawan,${u.id},${u.name},${u.email} - ${u.pos},${u.joinDate}`));

                ann.forEach(a => csvRows.push(`Pengumuman,${a.id},${a.title},Oleh: ${a.author},${a.date}`));

                const csvContent = "data:text/csv;charset=utf-8," + csvRows.join("\n");
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `Laporan_SalesTrack_Keseluruhan_${new Date().toISOString().slice(0,10)}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                notify("Ekspor CSV Laporan Berhasil!");
            };

            const handlePushToSheet = async () => {
                if (!gsheetUrl) return notify("Harap masukkan URL Google Apps Script Web App!", "error");
                setSyncLoading(true);
                try {

                    await fetch(gsheetUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'push', payload })
                    });
                    notify("Penyelarasan (Push) berhasil dikirim ke Google Sheet!");
                } catch (e) {
                    notify("Penyelarasan gagal: " + e.message, "error");
                } finally {
                    setSyncLoading(false);
                }
            };

            const handlePullFromSheet = async () => {
                if (!gsheetUrl) return notify("Harap masukkan URL Google Apps Script Web App!", "error");

function doGet(e) {
  var prop = PropertiesService.getScriptProperties();
  var db = prop.getProperty('sales_db_backup');
  return ContentService.createTextOutput(db || "{}").setMimeType(ContentService.MimeType.JSON);

    });
    return ContentService.createTextOutput(JSON.stringify({status:"ok"}));

}</pre>

                                <div class="flex-1 bg-indigo-200 h-[40%] rounded-t-lg relative group"><span class="absolute bottom-full left-1/2 -translate-x-1/2 text-[9px] font-bold text-slate-500 opacity-0 group-hover:opacity-100 transition-all">40%</span></div>
                                <div class="flex-1 bg-indigo-200 h-[60%] rounded-t-lg relative group"><span class="absolute bottom-full left-1/2 -translate-x-1/2 text-[9px] font-bold text-slate-500 opacity-0 group-hover:opacity-100 transition-all">60%</span></div>
                                <div class="flex-1 bg-indigo-200 h-[50%] rounded-t-lg relative group"><span class="absolute bottom-full left-1/2 -translate-x-1/2 text-[9px] font-bold text-slate-500 opacity-0 group-hover:opacity-100 transition-all">50%</span></div>
                                <div class="flex-1 bg-indigo-600 h-[95%] rounded-t-lg relative group"><span class="absolute bottom-full left-1/2 -translate-x-1/2 text-[9px] font-bold text-indigo-700 opacity-100">95%</span></div>
                            </div>
                            <div class="flex justify-between text-[9px] font-bold text-slate-400 uppercase border-t pt-2">
                                <span>M1</span>
                                <span>M2</span>
                                <span>M3</span>
                                <span class="text-indigo-600 font-extrabold">Hari Ini</span>
                            </div>
                        </div>

                        <div class="bg-white p-5 rounded-[2rem] border shadow-sm space-y-3">
                            <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Analisis KPI Tim Sales</h4>
                            <div class="space-y-2 text-xs">
                                <div class="flex justify-between">
                                    <span class="font-bold text-slate-600">Kehadiran Harian</span>
                                    <span class="font-extrabold text-indigo-900">${att.length} Absensi</span>
                                </div>
                                <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                    <div class="bg-emerald-500 h-full" style="width: 85%"></div>
                                </div>
                                <div class="flex justify-between mt-2">
                                    <span class="font-bold text-slate-600">Tugas Diselesaikan</span>
                                    <span class="font-extrabold text-indigo-900">${tasks.filter(t => t.status === 'Selesai').length} / ${tasks.length} Tugas</span>
                                </div>
                                <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                    <div class="bg-indigo-600 h-full" style="width: ${tasks.length ? (tasks.filter(t => t.status === 'Selesai').length / tasks.length) * 100 : 0}%"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- PENELUSURAN DATA TIM -->
                    <div class="bg-white p-6 rounded-[2.5rem] border shadow-sm space-y-4">
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                            <div class="relative flex-1 max-w-sm">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400"><i class="fas fa-search text-xs"></i></span>
                                <input type="text" placeholder="Cari nama, tugas, atau presensi..." value=${searchTerm} onInput=${e => setSearchTerm(e.target.value)} class="w-full pl-9 pr-4 py-2.5 bg-slate-50 border rounded-2xl outline-none text-xs font-semibold focus:border-indigo-500 transition-all" />
                            </div>
                            <div class="flex gap-1.5 overflow-x-auto no-scrollbar">
                                <button onClick=${() => setFilterTab('all')} class="px-3 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-wider border ${filterTab === 'all' ? 'bg-indigo-950 text-white border-indigo-950' : 'bg-slate-50 text-slate-400'}">Semua</button>
                                <button onClick=${() => setFilterTab('att')} class="px-3 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-wider border ${filterTab === 'att' ? 'bg-indigo-950 text-white border-indigo-950' : 'bg-slate-50 text-slate-400'}">Presensi</button>
                                <button onClick=${() => setFilterTab('tasks')} class="px-3 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-wider border ${filterTab === 'tasks' ? 'bg-indigo-950 text-white border-indigo-950' : 'bg-slate-50 text-slate-400'}">Tugas</button>
                            </div>
                        </div>

                        <!-- TABEL DATA LENGKAP -->
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-xs">
                                <thead>
                                    <tr class="bg-slate-50 border-b text-slate-400 uppercase tracking-widest text-[9px] font-bold">
                                        <th class="p-3">Kategori</th>
                                        <th class="p-3">Detail Utama</th>
                                        <th class="p-3">Keterangan</th>
                                        <th class="p-3">Waktu/Batas</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y font-semibold text-slate-600">
                                    ${(filterTab === 'all' || filterTab === 'att') && att
                                        .filter(a => a.userName.toLowerCase().includes(searchTerm.toLowerCase()) || a.notes.toLowerCase().includes(searchTerm.toLowerCase()))
                                        .map(a => html`
                                        <tr class="hover:bg-slate-50/40">
                                            <td class="p-3"><span class="px-2 py-0.5 bg-emerald-100 text-emerald-800 rounded-full text-[8px] uppercase font-bold">Presensi</span></td>
                                            <td class="p-3 font-bold text-slate-800">${a.userName}</td>
                                            <td class="p-3 truncate max-w-[150px]">${a.type} - ${a.notes}</td>
                                            <td class="p-3 text-indigo-700 font-bold">${a.time}</td>
                                        </tr>
                                    `)}
                                    ${(filterTab === 'all' || filterTab === 'tasks') && tasks
                                        .filter(t => t.title.toLowerCase().includes(searchTerm.toLowerCase()) || t.assignedName.toLowerCase().includes(searchTerm.toLowerCase()))
                                        .map(t => html`
                                        <tr class="hover:bg-slate-50/40">
                                            <td class="p-3"><span class="px-2 py-0.5 bg-indigo-100 text-indigo-800 rounded-full text-[8px] uppercase font-bold">Tugas</span></td>
                                            <td class="p-3 font-bold text-slate-800">${t.title}</td>
                                            <td class="p-3">PIC: ${t.assignedName} (${t.status})</td>
                                            <td class="p-3 text-rose-600 font-bold">${t.deadline}</td>
                                        </tr>
                                    `)}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }

        function NavBtn({ icon, label, active, onClick }) {
            return html`
                <button onClick=${onClick} class="flex items-center gap-3 w-full p-3 rounded-xl transition-all font-bold text-xs ${active ? 'bg-indigo-900 text-indigo-200' : 'text-indigo-400 hover:bg-indigo-900/30'}">
                    <i class="fas ${icon} text-sm"></i>
                    <span>${label}</span>
                </button>
            `;
        }

        function MobileNavBtn({ icon, label, active, onClick }) {
            return html`
                <button onClick=${onClick} class="flex flex-col items-center justify-center p-2 rounded-xl flex-1 transition-all ${active ? 'text-indigo-600' : 'text-slate-400'}">
                    <i class="fas ${icon} text-base"></i>
                    <span class="text-[9px] font-black uppercase mt-1 tracking-tighter">${label}</span>
                </button>
            `;
        }

        preact.render(html`<${App} />`, document.getElementById('root'));
    </script>
</body>
</html>
