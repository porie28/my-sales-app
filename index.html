<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SalesTrack Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Library Tanpa Babel: Pasti Jalan di Semua HP -->
    <script src="https://unpkg.com/htm/preact/standalone.umd.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script>
        // Menggunakan library Preact Standalone (Tanpa Build/Babel)
        const { html, render, useState, useEffect, useRef } = htmPreact;

        const USERS = [
            { id: "U01", email: "admin@sales.com", password: "admin123", name: "Hendra Wijaya", role: "admin", pos: "Manager HRD", div: "Pusat" },
            { id: "U02", email: "sales@sales.com", password: "sales123", name: "Budi Pratama", role: "staff", pos: "Field Sales", div: "Jakarta" }
        ];

        function App() {
            const [user, setUser] = useState(() => JSON.parse(localStorage.getItem('st_user')) || null);
            const [tab, setTab] = useState('dash');
            const [logs, setLogs] = useState(() => JSON.parse(localStorage.getItem('st_logs')) || []);
            const [tasks, setTasks] = useState(() => JSON.parse(localStorage.getItem('st_tasks')) || [
                { id: 101, title: "Kunjungan PT Maju", assigned: "U02", status: "Proses" },
                { id: 102, title: "Laporan Mingguan", assigned: "U01", status: "Selesai" }
            ]);

            useEffect(() => {
                localStorage.setItem('st_user', JSON.stringify(user));
                localStorage.setItem('st_logs', JSON.stringify(logs));
                localStorage.setItem('st_tasks', JSON.stringify(tasks));
            }, [user, logs, tasks]);

            if (!user) return html`<${Login} onLogin=${setUser} />`;

            return html`
                <div class="min-h-screen flex flex-col pb-24">
                    <header class="bg-white p-5 flex justify-between items-center shadow-sm sticky top-0 z-50">
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white"><i class="fas fa-bolt"></i></div>
                            <h1 class="font-black text-indigo-900 tracking-tighter">STRACK PRO</h1>
                        </div>
                        <button onClick=${() => setUser(null)} class="text-rose-500 font-bold text-xs">LOGOUT</button>
                    </header>

                    <main class="p-4 max-w-lg mx-auto w-full">
                        ${tab === 'dash' && html`<${Dashboard} user=${user} logs=${logs} tasks=${tasks} />`}
                        ${tab === 'absen' && html`<${Absensi} user=${user} logs=${logs} setLogs=${setLogs} />`}
                        ${tab === 'task' && html`<${Tugas} user=${user} tasks=${tasks} setTasks=${setTasks} />`}
                    </main>

                    <nav class="fixed bottom-4 left-4 right-4 bg-white/90 glass border border-slate-100 shadow-2xl rounded-3xl flex justify-around p-2 z-50">
                        <NavBtn icon="fa-house" label="Home" act=${tab==='dash'} click=${()=>setTab('dash')} />
                        <NavBtn icon="fa-camera" label="Absen" act=${tab==='absen'} click=${()=>setTab('absen')} />
                        <NavBtn icon="fa-list-check" label="Tugas" act=${tab==='task'} click=${()=>setTab('task')} />
                    </nav>
                </div>
            `;
        }

        function NavBtn({icon, label, act, click}) {
            return html`
                <button onClick=${click} class="flex flex-col items-center p-3 rounded-2xl transition-all ${act ? 'text-indigo-600 bg-indigo-50' : 'text-slate-400'}">
                    <i class="fas ${icon} text-lg"></i>
                    <span class="text-[9px] font-bold mt-1 uppercase">${label}</span>
                </button>
            `;
        }

        function Login({onLogin}) {
            const [e, setE] = useState('');
            const [p, setP] = useState('');
            return html`
                <div class="min-h-screen bg-indigo-950 flex items-center justify-center p-6 text-white">
                    <div class="w-full max-w-sm bg-white/10 glass p-8 rounded-[2.5rem] border border-white/20">
                        <h2 class="text-3xl font-black text-center mb-8 tracking-tighter">PORTAL SALES</h2>
                        <div class="space-y-4">
                            <input value=${e} onInput=${x=>setE(x.target.value)} type="email" placeholder="Email" class="w-full p-4 rounded-2xl bg-white/10 outline-none border border-white/10 focus:border-indigo-400" />
                            <input value=${p} onInput=${x=>setP(x.target.value)} type="password" placeholder="Password" class="w-full p-4 rounded-2xl bg-white/10 outline-none border border-white/10 focus:border-indigo-400" />
                            <button onClick=${() => {
                                const found = USERS.find(u => u.email === e && u.password === p);
                                if(found) onLogin(found); else alert("Salah!");
                            }} class="w-full p-4 bg-indigo-500 rounded-2xl font-black uppercase tracking-widest text-xs shadow-xl">Masuk</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function Dashboard({user, logs, tasks}) {
            return html`
                <div class="space-y-4">
                    <div class="bg-gradient-to-br from-indigo-600 to-indigo-800 p-8 rounded-[2.5rem] text-white shadow-xl">
                        <p class="text-[10px] font-bold opacity-60 uppercase tracking-widest">Selamat Datang</p>
                        <h2 class="text-3xl font-black">${user.name}</h2>
                        <p class="text-xs mt-2">${user.pos} • ${user.div}</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                            <p class="text-[10px] font-bold text-slate-400 uppercase">Tugas Aktif</p>
                            <p class="text-3xl font-black text-slate-800">${tasks.filter(t=>t.status!=='Selesai').length}</p>
                        </div>
                        <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                            <p class="text-[10px] font-bold text-slate-400 uppercase">Absen Hari Ini</p>
                            <p class="text-3xl font-black text-slate-800">${logs.length}</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function Absensi({user, logs, setLogs}) {
            const [photo, setPhoto] = useState(null);
            const [note, setNote] = useState('');
            const vRef = useRef(null);

            const start = async () => {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                vRef.current.srcObject = s;
            };

            const snap = () => {
                const c = document.createElement('canvas');
                c.width = vRef.current.videoWidth; c.height = vRef.current.videoHeight;
                c.getContext('2d').drawImage(vRef.current, 0, 0);
                setPhoto(c.toDataURL('image/png'));
                vRef.current.srcObject.getTracks().forEach(t => t.stop());
            };

            return html`
                <div class="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-100 space-y-4">
                    <h3 class="font-black text-slate-800 uppercase tracking-tighter">Presensi Lapangan</h3>
                    <div class="aspect-[3/4] bg-slate-900 rounded-3xl overflow-hidden shadow-inner flex items-center justify-center">
                        ${!photo ? html`<video ref=${vRef} autoPlay playsInline class="w-full h-full object-cover" />` : html`<img src=${photo} class="w-full h-full object-cover" />`}
                    </div>
                    <div class="flex gap-2">
                        ${!photo ? html`<button onClick=${start} class="flex-1 p-4 bg-slate-100 rounded-2xl font-bold text-xs uppercase">Buka Kamera</button>` : null}
                        ${!photo ? html`<button onClick=${snap} class="flex-1 bg-indigo-600 text-white p-4 rounded-2xl font-bold text-xs uppercase shadow-lg">Ambil Foto</button>` : null}
                    </div>
                    <textarea value=${note} onInput=${x=>setNote(x.target.value)} placeholder="Tulis aktivitas hari ini..." class="w-full p-5 bg-slate-50 rounded-2xl h-24 text-sm outline-none" />
                    <button onClick=${() => {
                        if(!photo || !note) return alert("Wajib Foto & Catatan!");
                        const n = { id: Date.now(), name: user.name, time: new Date().toLocaleString('id-ID'), photo, note };
                        setLogs([n, ...logs]); alert("Berhasil!"); setPhoto(null); setNote('');
                    }} class="w-full p-4 bg-slate-900 text-white rounded-2xl font-black uppercase text-xs tracking-widest shadow-2xl">Kirim Absensi</button>

                    ${user.role === 'admin' && html`
                        <div class="mt-8 border-t pt-6 space-y-4">
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest tracking-tighter">Rekap Riwayat Presensi</p>
                            ${logs.map(l => html`
                                <div class="flex gap-4 p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                    <img src=${l.photo} class="w-12 h-12 rounded-xl object-cover shadow-sm" />
                                    <div class="flex-1">
                                        <p class="font-bold text-sm text-slate-800">${l.name}</p>
                                        <p class="text-[9px] text-indigo-500 font-bold uppercase">${l.time}</p>
                                        <p class="text-xs text-slate-500 mt-1 italic">"${l.note}"</p>
                                    </div>
                                </div>
                            `)}
                        </div>
                    `}
                </div>
            `;
        }

        function Tugas({user, tasks, setTasks}) {
            return html`
                <div class="space-y-4">
                    <h3 class="font-black text-slate-800 uppercase tracking-tighter">Daftar Pekerjaan</h3>
                    ${tasks.filter(t => user.role === 'admin' ? true : t.assigned === user.id).map(t => html`
                        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center">
                            <div>
                                <p class="font-bold text-slate-700 text-sm">${t.title}</p>
                                <p class="text-[10px] font-bold uppercase text-slate-300 tracking-widest">${t.status}</p>
                            </div>
                            ${t.status !== 'Selesai' && html`
                                <button onClick=${() => setTasks(tasks.map(item => item.id === t.id ? {...item, status: 'Selesai'} : item))} class="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center border border-emerald-100">
                                    <i class="fas fa-check"></i>
                                </button>
                            `}
                        </div>
                    `)}
                </div>
            `;
        }

        render(html`<${App} />`, document.getElementById('root'));
    </script>
</body>
</html>
